name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Package
        run: mvn -B clean package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simple-pic-dist
          path: |
            target/simple-pic-*-bin.zip
            target/simple-pic-*-bin.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/simple-pic-*-bin.zip
            target/simple-pic-*-bin.tar.gz
