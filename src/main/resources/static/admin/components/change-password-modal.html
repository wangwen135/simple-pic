<div id="change-password-modal" class="hidden fixed inset-0 z-[10000] flex items-center justify-center bg-black/50" onclick="closeChangePasswordModalOnClick(event)">
    <div class="modal glass rounded-xl p-6 max-w-md w-full mx-4" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-semibold text-primary" data-i18n="change_password">Change Password</h2>
            <button onclick="closeChangePasswordModal()" class="p-1 rounded-lg hover:bg-slate-700/50 transition-colors text-muted hover:text-primary">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2"><span class="text-red-500">*</span> <span data-i18n="current_password">Current Password</span></label>
                <input type="password" id="current-password" class="input-field w-full px-4 py-3 rounded-lg" placeholder="">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2"><span class="text-red-500">*</span> <span data-i18n="new_password">New Password</span></label>
                <input type="password" id="new-password" class="input-field w-full px-4 py-3 rounded-lg" placeholder="">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2"><span class="text-red-500">*</span> <span data-i18n="confirm_password">Confirm Password</span></label>
                <input type="password" id="confirm-password" class="input-field w-full px-4 py-3 rounded-lg" placeholder="">
            </div>
        </div>

        <div class="flex justify-end space-x-3 mt-6">
            <button onclick="closeChangePasswordModal()" class="px-4 py-2 rounded-lg btn-secondary text-sm" data-i18n="cancel">Cancel</button>
            <button onclick="submitChangePassword()" class="px-4 py-2 rounded-lg btn-primary text-sm text-white" data-i18n="confirm">Confirm</button>
        </div>
    </div>
</div>
