<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Pic - System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%); }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover { background: rgba(59, 130, 246, 0.1); }
        .sidebar-link.active { background: rgba(59, 130, 246, 0.2); border-left: 3px solid #3b82f6; }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="flex">
        <aside class="w-64 min-h-screen glass border-r border-slate-700/50 p-4">
            <div class="flex items-center space-x-3 mb-8 px-2">
                <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-lg font-bold text-white">Simple-Pic</span>
            </div>
            <nav class="space-y-1">
                <a href="/admin/dashboard.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span>Dashboard</span></a>
                <a href="/admin/images.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><span>Images</span></a>
                <a href="/admin/storage.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"></path></svg><span>Storage</span></a>
                <a href="/admin/users.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg><span>Users</span></a>
                <a href="/admin/system.html" class="sidebar-link active flex items-center space-x-3 px-3 py-2 rounded-lg text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg><span>System</span></a>
                <a href="/admin/apikey.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg><span>API Keys</span></a>
            </nav>
            <div class="absolute bottom-4 left-4 right-4">
                <a href="/upload.html" class="flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg><span>Upload</span></a>
                <button onclick="logout()" class="w-full mt-2 flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg><span>Logout</span></button>
            </div>
        </aside>
        <main class="flex-1 p-8">
            <h1 class="text-3xl font-bold text-white mb-8">System Settings</h1>
            <div class="space-y-6">
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold text-white mb-4">Basic Information</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">System Name</label>
                            <input type="text" id="sys-name" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Description</label>
                            <input type="text" id="sys-desc" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold text-white mb-4">Watermark Settings</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="flex items-center space-x-2 mb-2">
                                <input type="checkbox" id="wm-enabled" class="w-4 h-4 rounded bg-slate-700 text-blue-600">
                                <span class="text-slate-300">Enable Watermark</span>
                            </label>
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Type</label>
                            <select id="wm-type" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                                <option value="text">Text</option>
                                <option value="image">Image</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Content</label>
                            <input type="text" id="wm-content" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Position</label>
                            <select id="wm-position" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                                <option value="top-left">Top Left</option>
                                <option value="top-right">Top Right</option>
                                <option value="bottom-left">Bottom Left</option>
                                <option value="bottom-right">Bottom Right</option>
                                <option value="center">Center</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Opacity</label>
                            <input type="number" id="wm-opacity" step="0.1" min="0" max="1" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold text-white mb-4">Security Settings</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="flex items-center space-x-2 mb-2">
                                <input type="checkbox" id="rl-enabled" class="w-4 h-4 rounded bg-slate-700 text-blue-600">
                                <span class="text-slate-300">Enable Rate Limit</span>
                            </label>
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Max Requests</label>
                            <input type="number" id="rl-max" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Time Window (seconds)</label>
                            <input type="number" id="rl-window" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold text-white mb-4">Frontend Settings</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Theme</label>
                            <select id="frontend-theme" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                                <option value="dark">Dark</option>
                                <option value="light">Light</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Items Per Page</label>
                            <input type="number" id="frontend-items" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">Save Settings</button>
            </div>
        </main>
    </div>
    <script>
        async function loadSettings() {
            try {
                const response = await fetch('/api/admin/config');
                const data = await response.json();

                if (data.success && data.config) {
                    const c = data.config;
                    document.getElementById('sys-name').value = c.name || '';
                    document.getElementById('sys-desc').value = c.description || '';
                    document.getElementById('wm-enabled').checked = c.watermarkEnabled;
                    document.getElementById('wm-type').value = c.watermarkType || 'text';
                    document.getElementById('wm-content').value = c.watermarkContent || '';
                    document.getElementById('wm-position').value = c.watermarkPosition || 'bottom-right';
                    document.getElementById('wm-opacity').value = c.watermarkOpacity || 0.5;
                    document.getElementById('rl-enabled').checked = c.rateLimitEnabled;
                    document.getElementById('rl-max').value = c.maxRequests || 100;
                    document.getElementById('rl-window').value = c.timeWindow || 60;
                    document.getElementById('frontend-theme').value = c.theme || 'dark';
                    document.getElementById('frontend-items').value = c.itemsPerPage || 50;
                }
            } catch (error) {
                console.error('Failed to load settings:', error);
            }
        }

        async function saveSettings() {
            const config = {
                name: document.getElementById('sys-name').value,
                description: document.getElementById('sys-desc').value,
                watermarkEnabled: document.getElementById('wm-enabled').checked,
                watermarkType: document.getElementById('wm-type').value,
                watermarkContent: document.getElementById('wm-content').value,
                watermarkPosition: document.getElementById('wm-position').value,
                watermarkOpacity: parseFloat(document.getElementById('wm-opacity').value),
                rateLimitEnabled: document.getElementById('rl-enabled').checked,
                maxRequests: parseInt(document.getElementById('rl-max').value),
                timeWindow: parseInt(document.getElementById('rl-window').value),
                theme: document.getElementById('frontend-theme').value,
                itemsPerPage: parseInt(document.getElementById('frontend-items').value)
            };

            try {
                const response = await fetch('/api/admin/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const result = await response.json();

                if (result.success) {
                    alert('Settings saved successfully!');
                } else {
                    alert(result.error);
                }
            } catch (error) {
                alert('Failed to save settings');
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        document.addEventListener('DOMContentLoaded', loadSettings);
    </script>
</body>
</html>
