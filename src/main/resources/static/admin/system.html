<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="title_system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Pic - System</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="/lib/tailwindcss.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/toast.js"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/lib/inter-font.css">
    <script src="/js/admin-components.js"></script>
</head>
<body class="gradient-bg h-screen overflow-hidden flex flex-col">
    <!-- Component containers -->
    <div id="header-container" class="flex-shrink-0"></div>
    <div class="flex flex-1 overflow-hidden">
        <div id="sidebar-container" class="flex-shrink-0"></div>
        <main class="flex-1 overflow-y-auto p-8">
            <h1 class="text-3xl font-bold mb-8" data-i18n="system_settings">System Settings</h1>
            <div class="space-y-6">
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4" data-i18n="system_name">Basic Information</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-secondary text-sm mb-1" data-i18n="system_name">System Name</label>
                            <input type="text" id="sys-name" class="w-full px-4 py-2 input-field rounded-lg">
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1" data-i18n="system_description">Description</label>
                            <input type="text" id="sys-desc" class="w-full px-4 py-2 input-field rounded-lg">
                        </div>
                        <div>
                            <label class="flex items-center space-x-2">
                                <input type="checkbox" id="anonymous-enabled" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-secondary" data-i18n="anonymous_upload_enabled">Enable Anonymous Upload</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4" data-i18n="watermark_enabled">Watermark Settings</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="flex items-center space-x-2 mb-2">
                                <input type="checkbox" id="wm-enabled" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-secondary" data-i18n="watermark_enabled">Enable Watermark</span>
                            </label>
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1" data-i18n="watermark_type">Type</label>
                            <select id="wm-type" class="w-full px-4 py-2 input-field rounded-lg">
                                <option value="text">Text</option>
                                <option value="image">Image</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1" data-i18n="watermark_content">Content</label>
                            <input type="text" id="wm-content" class="w-full px-4 py-2 input-field rounded-lg">
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1" data-i18n="watermark_position">Position</label>
                            <select id="wm-position" class="w-full px-4 py-2 input-field rounded-lg">
                                <option value="top-left">Top Left</option>
                                <option value="top-right">Top Right</option>
                                <option value="bottom-left">Bottom Left</option>
                                <option value="bottom-right">Bottom Right</option>
                                <option value="center">Center</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1" data-i18n="watermark_opacity">Opacity</label>
                            <input type="number" id="wm-opacity" step="0.1" min="0" max="1" class="w-full px-4 py-2 input-field rounded-lg">
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4" data-i18n="security_settings">Security Settings</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="flex items-center space-x-2 mb-2">
                                <input type="checkbox" id="rl-enabled" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-secondary">Enable Rate Limit</span>
                            </label>
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">Max Requests</label>
                            <input type="number" id="rl-max" class="w-full px-4 py-2 input-field rounded-lg">
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">Time Window (seconds)</label>
                            <input type="number" id="rl-window" class="w-full px-4 py-2 input-field rounded-lg">
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4" data-i18n="settings">Frontend Settings</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-secondary text-sm mb-1" data-i18n="theme">Theme</label>
                            <select id="frontend-theme" class="w-full px-4 py-2 input-field rounded-lg">
                                <option value="light" data-i18n="light">Light</option>
                                <option value="dark" data-i18n="dark">Dark</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">Items Per Page</label>
                            <input type="number" id="frontend-items" class="w-full px-4 py-2 input-field rounded-lg">
                        </div>
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full px-4 py-2 btn-primary text-white rounded-lg transition-colors" data-i18n="save">Save Settings</button>
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div id="modal-container"></div>

    <script>
        // Show loading immediately to prevent flash
        (function() {
            const loading = document.createElement('div');
            loading.id = 'admin-loading-overlay';
            loading.className = 'fixed inset-0 bg-slate-900/80 flex items-center justify-center z-[9999] transition-opacity duration-200';
            loading.innerHTML = `
                <div class="glass rounded-xl p-6 flex items-center space-x-3">
                    <svg class="animate-spin h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-primary">Loading...</span>
                </div>
            `;
            document.body.appendChild(loading);
        })();

        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize admin layout
            await AdminComponents.init('system');

            // Load settings
            loadSettings();

            // Hide loading after data loaded
            const loading = document.getElementById('admin-loading-overlay');
            if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => loading.remove(), 200);
            }
        });

        async function loadSettings() {
            try {
                const response = await fetch('/api/admin/config');
                const data = await response.json();

                if (data.success && data.config) {
                    const c = data.config;
                    document.getElementById('sys-name').value = c.name || '';
                    document.getElementById('sys-desc').value = c.description || '';
                    document.getElementById('anonymous-enabled').checked = c.anonymousUploadEnabled || false;
                    document.getElementById('wm-enabled').checked = c.watermarkEnabled;
                    document.getElementById('wm-type').value = c.watermarkType || 'text';
                    document.getElementById('wm-content').value = c.watermarkContent || '';
                    document.getElementById('wm-position').value = c.watermarkPosition || 'bottom-right';
                    document.getElementById('wm-opacity').value = c.watermarkOpacity || 0.5;
                    document.getElementById('rl-enabled').checked = c.rateLimitEnabled;
                    document.getElementById('rl-max').value = c.maxRequests || 100;
                    document.getElementById('rl-window').value = c.timeWindow || 60;
                    document.getElementById('frontend-theme').value = c.theme || 'light';
                    document.getElementById('frontend-items').value = c.itemsPerPage || 50;
                }
            } catch (error) {
                console.error('Failed to load settings:', error);
            }
        }

        async function saveSettings() {
            const config = {
                name: document.getElementById('sys-name').value,
                description: document.getElementById('sys-desc').value,
                anonymousUploadEnabled: document.getElementById('anonymous-enabled').checked,
                watermarkEnabled: document.getElementById('wm-enabled').checked,
                watermarkType: document.getElementById('wm-type').value,
                watermarkContent: document.getElementById('wm-content').value,
                watermarkPosition: document.getElementById('wm-position').value,
                watermarkOpacity: parseFloat(document.getElementById('wm-opacity').value),
                rateLimitEnabled: document.getElementById('rl-enabled').checked,
                maxRequests: parseInt(document.getElementById('rl-max').value),
                timeWindow: parseInt(document.getElementById('rl-window').value),
                theme: document.getElementById('frontend-theme').value,
                itemsPerPage: parseInt(document.getElementById('frontend-items').value)
            };

            try {
                const response = await fetch('/api/admin/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const result = await response.json();

                if (result.success) {
                    Toast.success(i18n.t('success') + '!');
                } else {
                    Toast.error(result.error);
                }
            } catch (error) {
                Toast.error('Failed to save settings');
            }
        }
    </script>
</body>
</html>
