<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Pic - System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/i18n.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-color: #3b82f6;
            --sidebar-bg: rgba(255, 255, 255, 0.95);
            --sidebar-text: #1e293b;
            --sidebar-text-hover: #0f172a;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --sidebar-bg: rgba(15, 23, 42, 0.9);
            --sidebar-text: #e2e8f0;
            --sidebar-text-hover: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        }

        [data-theme="light"] .gradient-bg {
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 50%, #f8fafc 100%);
        }

        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] .glass {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        /* Sidebar styles */
        .sidebar {
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
        }

        .sidebar-link {
            transition: all 0.2s ease;
            color: var(--sidebar-text);
        }

        .sidebar-link:hover {
            background: rgba(59, 130, 246, 0.1);
            color: var(--sidebar-text-hover);
        }

        [data-theme="light"] .sidebar-link:hover {
            background: rgba(59, 130, 246, 0.12);
            color: #0f172a;
        }

        .sidebar-link.active {
            background: rgba(59, 130, 246, 0.15);
            border-left: 3px solid #3b82f6;
            color: var(--sidebar-text-hover);
            font-weight: 500;
        }

        [data-theme="light"] .sidebar-link.active {
            background: rgba(59, 130, 246, 0.12);
            color: #0f172a;
        }

        .sidebar-title {
            color: var(--sidebar-text-hover);
            font-weight: 700;
        }

        .theme-btn, .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.2s ease;
        }

        [data-theme="light"] .theme-btn,
        [data-theme="light"] .lang-btn {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
        }

        .theme-btn:hover, .lang-btn:hover {
            background: rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <!-- Header -->
    <header class="glass border-b border-slate-700/50 h-16 flex items-center justify-between px-6 sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold" data-i18n="app_title">Simple-Pic</h1>
        </div>

        <div class="flex items-center space-x-4">
            <a href="/upload.html" class="flex items-center space-x-2 px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                <span data-i18n="upload">Upload</span>
            </a>

            <div class="flex items-center space-x-2 px-3 py-2 rounded-lg bg-slate-800/50">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                <span id="username" class="text-sm text-slate-300">admin</span>
            </div>

            <button onclick="logout()" class="flex items-center space-x-2 px-3 py-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700/50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                <span class="text-sm" data-i18n="logout">Logout</span>
            </button>

            <div class="w-px h-6 bg-slate-600"></div>

            <button id="langBtn" class="lang-btn px-3 py-2 rounded-lg text-sm font-medium">
                <span id="langText">中文</span>
            </button>
            <button id="themeBtn" class="theme-btn px-3 py-2 rounded-lg" title="Toggle theme">
                <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
            </button>
        </div>
    </header>

    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-64 min-h-screen sidebar p-4 border-r border-slate-700/50 pt-6">
            <nav class="space-y-1">
                <a href="/admin/dashboard.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    <span data-i18n="dashboard">Dashboard</span>
                </a>
                <a href="/admin/images.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <span data-i18n="image_management">Images</span>
                </a>
                <a href="/admin/storage.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"></path>
                    </svg>
                    <span data-i18n="storage_management">Storage</span>
                </a>
                <a href="/admin/users.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <span data-i18n="user_management">Users</span>
                </a>
                <a href="/admin/system.html" class="sidebar-link active flex items-center space-x-3 px-3 py-2 rounded-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <span data-i18n="system_settings">System</span>
                </a>
                <a href="/admin/apikey.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                    <span data-i18n="api_key_management">API Keys</span>
                </a>
            </nav>
        </aside>
        <main class="flex-1 p-8">
            <h1 class="text-3xl font-bold mb-8" data-i18n="system_settings">System Settings</h1>
            <div class="space-y-6">
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4" data-i18n="system_name">Basic Information</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-300 text-sm mb-1" data-i18n="system_name">System Name</label>
                            <input type="text" id="sys-name" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1" data-i18n="system_description">Description</label>
                            <input type="text" id="sys-desc" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                        <div>
                            <label class="flex items-center space-x-2">
                                <input type="checkbox" id="anonymous-enabled" class="w-4 h-4 rounded bg-slate-700 text-blue-600">
                                <span class="text-slate-300" data-i18n="anonymous_upload_enabled">Enable Anonymous Upload</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4" data-i18n="watermark_enabled">Watermark Settings</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="flex items-center space-x-2 mb-2">
                                <input type="checkbox" id="wm-enabled" class="w-4 h-4 rounded bg-slate-700 text-blue-600">
                                <span class="text-slate-300" data-i18n="watermark_enabled">Enable Watermark</span>
                            </label>
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1" data-i18n="watermark_type">Type</label>
                            <select id="wm-type" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                                <option value="text">Text</option>
                                <option value="image">Image</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1" data-i18n="watermark_content">Content</label>
                            <input type="text" id="wm-content" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1" data-i18n="watermark_position">Position</label>
                            <select id="wm-position" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                                <option value="top-left">Top Left</option>
                                <option value="top-right">Top Right</option>
                                <option value="bottom-left">Bottom Left</option>
                                <option value="bottom-right">Bottom Right</option>
                                <option value="center">Center</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1" data-i18n="watermark_opacity">Opacity</label>
                            <input type="number" id="wm-opacity" step="0.1" min="0" max="1" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4" data-i18n="security_settings">Security Settings</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="flex items-center space-x-2 mb-2">
                                <input type="checkbox" id="rl-enabled" class="w-4 h-4 rounded bg-slate-700 text-blue-600">
                                <span class="text-slate-300">Enable Rate Limit</span>
                            </label>
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Max Requests</label>
                            <input type="number" id="rl-max" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Time Window (seconds)</label>
                            <input type="number" id="rl-window" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4" data-i18n="settings">Frontend Settings</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-300 text-sm mb-1" data-i18n="theme">Theme</label>
                            <select id="frontend-theme" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                                <option value="light" data-i18n="light">Light</option>
                                <option value="dark" data-i18n="dark">Dark</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-slate-300 text-sm mb-1">Items Per Page</label>
                            <input type="number" id="frontend-items" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        </div>
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors" data-i18n="save">Save Settings</button>
            </div>
        </main>
    </div>
    <script>
        const sunIcon = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
        const moonIcon = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';

        document.addEventListener('DOMContentLoaded', () => {
            updateThemeIcon();
            updateLangText();
            loadUserInfo();
            loadSettings();
        });

        // Load user info
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/auth/me');
                const data = await response.json();
                if (data.success && data.user) {
                    document.getElementById('username').textContent = data.user.username;
                }
            } catch (error) {
                console.error('Failed to load user info');
            }
        }

        document.getElementById('themeBtn').addEventListener('click', () => {
            i18n.toggleTheme();
            updateThemeIcon();
        });

        function updateThemeIcon() {
            const theme = i18n.getTheme();
            document.getElementById('themeIcon').innerHTML = theme === 'light' ? sunIcon : moonIcon;
        }

        document.getElementById('langBtn').addEventListener('click', () => {
            i18n.toggleLanguage();
            updateLangText();
        });

        function updateLangText() {
            const lang = i18n.getLanguage();
            document.getElementById('langText').textContent = lang === 'zh' ? '中文' : 'EN';
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/admin/config');
                const data = await response.json();

                if (data.success && data.config) {
                    const c = data.config;
                    document.getElementById('sys-name').value = c.name || '';
                    document.getElementById('sys-desc').value = c.description || '';
                    document.getElementById('anonymous-enabled').checked = c.anonymousUploadEnabled || false;
                    document.getElementById('wm-enabled').checked = c.watermarkEnabled;
                    document.getElementById('wm-type').value = c.watermarkType || 'text';
                    document.getElementById('wm-content').value = c.watermarkContent || '';
                    document.getElementById('wm-position').value = c.watermarkPosition || 'bottom-right';
                    document.getElementById('wm-opacity').value = c.watermarkOpacity || 0.5;
                    document.getElementById('rl-enabled').checked = c.rateLimitEnabled;
                    document.getElementById('rl-max').value = c.maxRequests || 100;
                    document.getElementById('rl-window').value = c.timeWindow || 60;
                    document.getElementById('frontend-theme').value = c.theme || 'light';
                    document.getElementById('frontend-items').value = c.itemsPerPage || 50;
                }
            } catch (error) {
                console.error('Failed to load settings:', error);
            }
        }

        async function saveSettings() {
            const config = {
                name: document.getElementById('sys-name').value,
                description: document.getElementById('sys-desc').value,
                anonymousUploadEnabled: document.getElementById('anonymous-enabled').checked,
                watermarkEnabled: document.getElementById('wm-enabled').checked,
                watermarkType: document.getElementById('wm-type').value,
                watermarkContent: document.getElementById('wm-content').value,
                watermarkPosition: document.getElementById('wm-position').value,
                watermarkOpacity: parseFloat(document.getElementById('wm-opacity').value),
                rateLimitEnabled: document.getElementById('rl-enabled').checked,
                maxRequests: parseInt(document.getElementById('rl-max').value),
                timeWindow: parseInt(document.getElementById('rl-window').value),
                theme: document.getElementById('frontend-theme').value,
                itemsPerPage: parseInt(document.getElementById('frontend-items').value)
            };

            try {
                const response = await fetch('/api/admin/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const result = await response.json();

                if (result.success) {
                    alert(i18n.t('success') + '!');
                } else {
                    alert(result.error);
                }
            } catch (error) {
                alert('Failed to save settings');
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
