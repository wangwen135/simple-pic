<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="title_system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Pic - System</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="/lib/tailwindcss.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/toast.js"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/lib/inter-font.css">
    <script src="/js/admin-components.js"></script>
    <style>
        .settings-tab {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
        }
        .settings-tab:hover { color: var(--text-primary); }
        .settings-tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
            font-weight: 500;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="gradient-bg h-screen overflow-hidden flex flex-col">
    <!-- Component containers -->
    <div id="header-container" class="flex-shrink-0"></div>
    <div class="flex flex-1 overflow-hidden">
        <div id="sidebar-container" class="flex-shrink-0"></div>
        <main class="flex-1 overflow-y-auto p-8">
            <h1 class="text-3xl font-bold mb-6" data-i18n="system_settings">System Settings</h1>

            <!-- Tab Navigation -->
            <div class="glass rounded-t-xl border-b border-slate-200 dark:border-slate-700">
                <div class="flex overflow-x-auto px-2">
                    <button class="settings-tab active" onclick="switchTab('basic')">基本信息</button>
                    <button class="settings-tab" onclick="switchTab('security')">安全设置</button>
                    <button class="settings-tab" onclick="switchTab('lockout')">登录锁定</button>
                    <button class="settings-tab" onclick="switchTab('hotlink')">防盗链</button>
                </div>
            </div>

            <!-- Tab Contents -->
            <div class="glass rounded-b-xl p-6 mb-4" style="min-height: 300px;">

                <!-- Basic Info Tab -->
                <div id="tab-basic" class="tab-content active">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-secondary text-sm mb-1">系统名称</label>
                            <input type="text" id="sys-name" class="w-full px-4 py-2 input-field rounded-lg" placeholder="Simple-Pic">
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">系统描述</label>
                            <input type="text" id="sys-desc" class="w-full px-4 py-2 input-field rounded-lg" placeholder="简单好用的图床">
                        </div>
                        <div class="md:col-span-2">
                            <label class="flex items-center space-x-2">
                                <input type="checkbox" id="anonymous-enabled" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-secondary">允许匿名上传</span>
                            </label>
                            <p class="text-xs text-muted mt-1">启用后，未登录用户可以上传图片到允许匿名上传的存储空间</p>
                        </div>
                        <div class="md:col-span-2">
                            <label class="flex items-center space-x-2">
                                <input type="checkbox" id="watermark-enabled" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-secondary">启用水印</span>
                            </label>
                            <p class="text-xs text-muted mt-1">全局水印开关，关闭后所有存储空间的水印将不生效；开启后由各存储空间独立配置</p>
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">最大文件大小（MB）</label>
                            <input type="number" id="max-file-size" class="w-full px-4 py-2 input-field rounded-lg" placeholder="10" min="1" max="100">
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">允许的文件格式</label>
                            <input type="text" id="allowed-file-types" class="w-full px-4 py-2 input-field rounded-lg" placeholder="jpg,jpeg,png,gif,webp,svg">
                            <p class="text-xs text-muted mt-1">多个格式用英文逗号分隔</p>
                        </div>
                    </div>
                </div>

                <!-- Security Tab -->
                <div id="tab-security" class="tab-content">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="flex items-center space-x-2">
                                <input type="checkbox" id="rl-enabled" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-secondary">启用限流</span>
                            </label>
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">最大请求数</label>
                            <input type="number" id="rl-max" class="w-full px-4 py-2 input-field rounded-lg" placeholder="100">
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">时间窗口（秒）</label>
                            <input type="number" id="rl-window" class="w-full px-4 py-2 input-field rounded-lg" placeholder="60">
                        </div>
                    </div>
                </div>

                <!-- Login Lockout Tab -->
                <div id="tab-lockout" class="tab-content">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="flex items-center space-x-2">
                                <input type="checkbox" id="lockout-enabled" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-secondary">启用登录锁定</span>
                            </label>
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">最大失败次数</label>
                            <input type="number" id="lockout-max-attempts" class="w-full px-4 py-2 input-field rounded-lg" placeholder="5" min="1">
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">锁定时间（分钟）</label>
                            <input type="number" id="lockout-minutes" class="w-full px-4 py-2 input-field rounded-lg" placeholder="30" min="1">
                        </div>
                    </div>
                    <p class="text-xs text-muted mt-4">启用后，同一 IP 连续登录失败达到最大次数后将被锁定指定时间。</p>
                </div>

                <!-- Hotlink Protection Tab -->
                <div id="tab-hotlink" class="tab-content">
                    <div class="space-y-4">
                        <div>
                            <label class="flex items-center space-x-2">
                                <input type="checkbox" id="hotlink-enabled" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-secondary">启用防盗链</span>
                            </label>
                            <p class="text-xs text-muted mt-1">启用后，只有白名单中的网站才能引用图片。直接访问图片链接（无 Referer）不受影响。</p>
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-1">允许的来源域名</label>
                            <textarea id="hotlink-referers" rows="4" class="w-full px-4 py-2 input-field rounded-lg text-sm" placeholder="example.com&#10;*.example.com&#10;blog.example.net"></textarea>
                            <p class="text-xs text-muted mt-1">每行一个域名，支持通配符如 *.example.com</p>
                        </div>
                        <div>
                            <label class="block text-secondary text-sm mb-2">违规处理方式</label>
                            <div class="flex flex-wrap gap-4">
                                <label class="flex items-center space-x-2">
                                    <input type="radio" name="hotlink-response" value="generated" class="text-blue-600" checked>
                                    <span class="text-secondary text-sm">生成提示图</span>
                                </label>
                                <label class="flex items-center space-x-2">
                                    <input type="radio" name="hotlink-response" value="image" class="text-blue-600">
                                    <span class="text-secondary text-sm">自定义图片</span>
                                </label>
                                <label class="flex items-center space-x-2">
                                    <input type="radio" name="hotlink-response" value="403" class="text-blue-600">
                                    <span class="text-secondary text-sm">返回 403</span>
                                </label>
                            </div>
                        </div>
                        <div id="hotlink-image-section" class="hidden">
                            <label class="block text-secondary text-sm mb-1">自定义防盗链提示图</label>
                            <div class="flex items-center gap-3">
                                <input type="file" id="hotlink-image-file" accept="image/*" class="text-sm text-secondary file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                                <button type="button" onclick="uploadHotlinkImage()" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-lg transition-colors">上传</button>
                            </div>
                            <div id="hotlink-image-preview-container" class="mt-2 hidden">
                                <img id="hotlink-image-preview" class="max-w-xs max-h-32 rounded-lg border border-slate-200 dark:border-slate-700">
                            </div>
                        </div>
                        <div id="hotlink-generated-preview-section" class="hidden">
                            <label class="block text-secondary text-sm mb-1">提示图预览</label>
                            <div class="rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 inline-block">
                                <canvas id="hotlink-generated-preview" width="400" height="200" style="display:block;max-width:100%;"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Save Button -->
            <button onclick="saveSettings()" class="w-full px-4 py-2.5 btn-primary text-white rounded-lg transition-colors font-medium">
                保存设置
            </button>
        </main>
    </div>

    <!-- Modal container -->
    <div id="modal-container"></div>

    <script>
        // Show loading immediately to prevent flash
        (function() {
            const loading = document.createElement('div');
            loading.id = 'admin-loading-overlay';
            loading.className = 'fixed inset-0 bg-slate-900/80 flex items-center justify-center z-[9999] transition-opacity duration-200';
            loading.innerHTML = `
                <div class="glass rounded-xl p-6 flex items-center space-x-3">
                    <svg class="animate-spin h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7 7.962 7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-primary">Loading...</span>
                </div>
            `;
            document.body.appendChild(loading);
        })();

        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize admin layout
            await AdminComponents.init('system');

            // Load settings
            loadSettings();

            // Hide loading after data loaded
            const loading = document.getElementById('admin-loading-overlay');
            if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => loading.remove(), 200);
            }
        });

        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.settings-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // Find the clicked tab button and activate it
            const tabs = document.querySelectorAll('.settings-tab');
            const tabMap = { basic: 0, security: 1, lockout: 2, hotlink: 3 };
            if (tabs[tabMap[tabName]]) {
                tabs[tabMap[tabName]].classList.add('active');
            }
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/admin/config');
                const data = await response.json();

                if (data.success && data.config) {
                    const c = data.config;
                    // Basic
                    document.getElementById('sys-name').value = c.name || '';
                    document.getElementById('sys-desc').value = c.description || '';
                    document.getElementById('anonymous-enabled').checked = c.anonymousUploadEnabled || false;
                    document.getElementById('watermark-enabled').checked = c.watermarkEnabled || false;
                    document.getElementById('max-file-size').value = c.maxFileSizeMB || 10;
                    document.getElementById('allowed-file-types').value = c.allowedFileTypes || 'jpg,jpeg,png,gif,webp,svg';
                    // Security
                    document.getElementById('rl-enabled').checked = c.rateLimitEnabled || false;
                    document.getElementById('rl-max').value = c.maxRequests || 100;
                    document.getElementById('rl-window').value = c.timeWindow || 60;
                    // Lockout
                    document.getElementById('lockout-enabled').checked = c.loginLockoutEnabled || false;
                    document.getElementById('lockout-max-attempts').value = c.maxFailedAttempts || 5;
                    document.getElementById('lockout-minutes').value = c.lockoutMinutes || 30;
                    // Hotlink
                    document.getElementById('hotlink-enabled').checked = c.hotlinkProtectionEnabled || false;
                    document.getElementById('hotlink-referers').value = c.allowedReferers || '';
                    const resp = c.hotlinkResponse || 'generated';
                    document.querySelectorAll('input[name="hotlink-response"]').forEach(r => r.checked = r.value === resp);
                    toggleHotlinkImageSection();
                    if (c.hotlinkImagePath) {
                        document.getElementById('hotlink-image-preview').src = '/api/admin/hotlink-image/preview?t=' + Date.now();
                        document.getElementById('hotlink-image-preview-container').classList.remove('hidden');
                    }
                    // Initialize preview visibility
                    toggleHotlinkImageSection();
                }
            } catch (error) {
                console.error('Failed to load settings:', error);
            }
        }

        async function saveSettings() {
            const hotlinkResponse = document.querySelector('input[name="hotlink-response"]:checked').value;
            const config = {
                name: document.getElementById('sys-name').value,
                description: document.getElementById('sys-desc').value,
                anonymousUploadEnabled: document.getElementById('anonymous-enabled').checked,
                watermarkEnabled: document.getElementById('watermark-enabled').checked,
                maxFileSizeMB: parseInt(document.getElementById('max-file-size').value) || 10,
                allowedFileTypes: document.getElementById('allowed-file-types').value,
                rateLimitEnabled: document.getElementById('rl-enabled').checked,
                maxRequests: parseInt(document.getElementById('rl-max').value),
                timeWindow: parseInt(document.getElementById('rl-window').value),
                loginLockoutEnabled: document.getElementById('lockout-enabled').checked,
                maxFailedAttempts: parseInt(document.getElementById('lockout-max-attempts').value),
                lockoutMinutes: parseInt(document.getElementById('lockout-minutes').value),
                hotlinkProtectionEnabled: document.getElementById('hotlink-enabled').checked,
                allowedReferers: document.getElementById('hotlink-referers').value,
                hotlinkResponse: hotlinkResponse
            };

            try {
                const response = await fetch('/api/admin/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const result = await response.json();

                if (result.success) {
                    Toast.success('设置已保存');
                } else {
                    Toast.error(result.error || '保存失败');
                }
            } catch (error) {
                Toast.error('保存设置失败');
            }
        }

        function toggleHotlinkImageSection() {
            const selected = document.querySelector('input[name="hotlink-response"]:checked');
            const val = selected ? selected.value : 'generated';
            document.getElementById('hotlink-image-section').classList.toggle('hidden', val !== 'image');
            const previewSection = document.getElementById('hotlink-generated-preview-section');
            if (val === 'generated') {
                previewSection.classList.remove('hidden');
                drawGeneratedPreview();
            } else {
                previewSection.classList.add('hidden');
            }
        }

        function drawGeneratedPreview() {
            const canvas = document.getElementById('hotlink-generated-preview');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;

            // White background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            // Red border
            ctx.strokeStyle = '#dc3545';
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, w - 20, h - 20);

            // Chinese title
            ctx.fillStyle = '#dc3545';
            ctx.font = 'bold 22px sans-serif';
            let text = '\u9632\u76D7\u94FE\u56FE\u7247\u7981\u6B62\u5F15\u7528';
            ctx.fillText(text, (w - ctx.measureText(text).width) / 2, 70);

            // English title
            ctx.font = 'bold 18px sans-serif';
            text = 'Hotlink Not Allowed';
            ctx.fillText(text, (w - ctx.measureText(text).width) / 2, 100);

            // Chinese subtitle
            ctx.fillStyle = '#6b7280';
            ctx.font = '13px sans-serif';
            text = '\u6B64\u56FE\u7247\u7981\u6B62\u5916\u90E8\u5F15\u7528';
            ctx.fillText(text, (w - ctx.measureText(text).width) / 2, 135);

            // English subtitle
            ctx.font = '12px sans-serif';
            text = 'This image is protected from hotlinking';
            ctx.fillText(text, (w - ctx.measureText(text).width) / 2, 160);
        }

        async function uploadHotlinkImage() {
            const fileInput = document.getElementById('hotlink-image-file');
            if (!fileInput.files || !fileInput.files[0]) {
                Toast.error('请先选择图片');
                return;
            }
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            try {
                const resp = await fetch('/api/admin/hotlink-image', {
                    method: 'POST',
                    body: formData
                });
                const result = await resp.json();
                if (result.success) {
                    Toast.success('防盗链提示图已上传');
                    document.getElementById('hotlink-image-preview').src = '/api/admin/hotlink-image/preview?t=' + Date.now();
                    document.getElementById('hotlink-image-preview-container').classList.remove('hidden');
                } else {
                    Toast.error(result.error || '上传失败');
                }
            } catch (e) {
                Toast.error('上传失败');
            }
        }

        // Radio change listener for hotlink response
        document.addEventListener('change', function(e) {
            if (e.target.name === 'hotlink-response') {
                toggleHotlinkImageSection();
            }
        });
    </script>
</body>
</html>
