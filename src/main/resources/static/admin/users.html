<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Pic - Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%); }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover { background: rgba(59, 130, 246, 0.1); }
        .sidebar-link.active { background: rgba(59, 130, 246, 0.2); border-left: 3px solid #3b82f6; }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="flex">
        <aside class="w-64 min-h-screen glass border-r border-slate-700/50 p-4">
            <div class="flex items-center space-x-3 mb-8 px-2">
                <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-lg font-bold text-white">Simple-Pic</span>
            </div>
            <nav class="space-y-1">
                <a href="/admin/dashboard.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span>Dashboard</span></a>
                <a href="/admin/images.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><span>Images</span></a>
                <a href="/admin/storage.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"></path></svg><span>Storage</span></a>
                <a href="/admin/users.html" class="sidebar-link active flex items-center space-x-3 px-3 py-2 rounded-lg text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg><span>Users</span></a>
                <a href="/admin/system.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg><span>System</span></a>
                <a href="/admin/apikey.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg><span>API Keys</span></a>
            </nav>
            <div class="absolute bottom-4 left-4 right-4">
                <a href="/upload.html" class="flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg><span>Upload</span></a>
                <button onclick="logout()" class="w-full mt-2 flex items-center space-x-3 px-3 py-2 rounded-lg text-slate-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg><span>Logout</span></button>
            </div>
        </aside>
        <main class="flex-1 p-8">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold text-white">Users</h1>
                <button onclick="showCreateModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">Create User</button>
            </div>
            <div class="glass rounded-xl p-6">
                <div id="user-list" class="space-y-4">
                    <p class="text-slate-500 text-center py-8">Loading...</p>
                </div>
            </div>
        </main>
    </div>
    <div id="create-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
        <div class="glass rounded-xl p-6 w-full max-w-md">
            <h2 class="text-xl font-bold text-white mb-4" id="modal-title">Create User</h2>
            <input type="hidden" id="edit-username" value="">
            <div class="space-y-4 mb-4">
                <div>
                    <label class="block text-slate-300 text-sm mb-1">Username</label>
                    <input type="text" id="create-username" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600" placeholder="username">
                </div>
                <div>
                    <label class="block text-slate-300 text-sm mb-1">Password</label>
                    <input type="password" id="create-password" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600" placeholder="********">
                </div>
                <div>
                    <label class="block text-slate-300 text-sm mb-1">Role</label>
                    <select id="create-role" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600">
                        <option value="USER">User</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-300 text-sm mb-1">Storage Spaces</label>
                    <input type="text" id="create-storages" class="w-full px-4 py-2 bg-slate-700 text-white rounded-lg border border-slate-600" placeholder="default">
                </div>
            </div>
            <button onclick="saveUser()" class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg mb-2" id="save-btn">Create</button>
            <button onclick="hideCreateModal()" class="w-full px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg">Cancel</button>
        </div>
    </div>
    <script>
        let isEditing = false;

        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const users = await response.json();
                renderUsers(users);
            } catch (error) {
                console.error('Failed to load users:', error);
            }
        }

        function renderUsers(users) {
            const container = document.getElementById('user-list');
            container.innerHTML = users.map(u => `
                <div class="p-4 rounded-lg bg-slate-800/50 flex items-center justify-between">
                    <div>
                        <h3 class="text-white font-medium">${u.username}</h3>
                        <p class="text-slate-400 text-sm">${u.role}</p>
                        <p class="text-slate-500 text-xs">Storage: ${u.storageSpaces.join(', ')}</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="editUser('${u.username}')" class="p-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button onclick="deleteUser('${u.username}')" class="p-2 bg-red-600 hover:bg-red-700 text-white rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('') || '<p class="text-slate-500 text-center py-8">No users found</p>';
        }

        function showCreateModal() {
            isEditing = false;
            document.getElementById('modal-title').textContent = 'Create User';
            document.getElementById('edit-username').value = '';
            document.getElementById('create-username').value = '';
            document.getElementById('create-password').value = '';
            document.getElementById('create-role').value = 'USER';
            document.getElementById('create-storages').value = 'default';
            document.getElementById('create-username').disabled = false;
            document.getElementById('save-btn').textContent = 'Create';
            document.getElementById('create-modal').classList.remove('hidden');
        }

        function hideCreateModal() {
            document.getElementById('create-modal').classList.add('hidden');
        }

        function editUser(username) {
            isEditing = true;
            document.getElementById('modal-title').textContent = 'Edit User';
            document.getElementById('edit-username').value = username;
            document.getElementById('create-username').value = username;
            document.getElementById('create-username').disabled = true;
            document.getElementById('save-btn').textContent = 'Update';
            document.getElementById('create-modal').classList.remove('hidden');
        }

        async function saveUser() {
            const username = document.getElementById('create-username').value;
            const password = document.getElementById('create-password').value;
            const role = document.getElementById('create-role').value;
            const storageSpaces = document.getElementById('create-storages').value.split(',').map(s => s.trim());

            const url = isEditing ? `/api/admin/users/${username}` : '/api/admin/users';
            const method = isEditing ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role, storageSpaces })
                });
                const result = await response.json();

                if (result.success) {
                    hideCreateModal();
                    loadUsers();
                } else {
                    alert(result.error);
                }
            } catch (error) {
                alert('Failed to save user');
            }
        }

        async function deleteUser(username) {
            if (!confirm(`Delete user "${username}"?`)) return;

            try {
                const response = await fetch(`/api/admin/users/${username}`, { method: 'DELETE' });
                const result = await response.json();

                if (result.success) {
                    loadUsers();
                }
            } catch (error) {
                alert('Failed to delete user');
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
