<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="title_images">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Pic - Images</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="/lib/tailwindcss.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/confirm.js"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/lib/inter-font.css">
    <script src="/js/admin-components.js"></script>
</head>
<body class="gradient-bg h-screen overflow-hidden flex flex-col">
    <!-- Component containers -->
    <div id="header-container" class="flex-shrink-0"></div>
    <div class="flex flex-1 overflow-hidden">
        <div id="sidebar-container" class="flex-shrink-0"></div>
        <main class="flex-1 overflow-y-auto p-8">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold" data-i18n="image_management">Images</h1>
                <button onclick="showUploadModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors" data-i18n="upload">Upload Image</button>
            </div>
            <div class="glass rounded-xl p-6 mb-6">
                <div class="flex items-center space-x-4 mb-4">
                    <select id="storageSpace" class="px-4 py-2 input-field rounded-lg" onchange="loadImages()">
                        <option value="default">default</option>
                    </select>
                    <div id="breadcrumb" class="flex items-center space-x-2 text-muted">
                        <span class="text-primary cursor-pointer hover:text-accent" onclick="navigate('')">Root</span>
                    </div>
                </div>
                <div id="images-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <p class="text-muted col-span-full text-center py-8">Loading...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div id="modal-container"></div>

    <div id="upload-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
        <div class="modal rounded-xl p-6 w-full max-w-md">
            <h2 class="text-xl font-bold text-primary mb-4" data-i18n="upload">Upload Image</h2>
            <div class="mb-4">
                <label class="block text-secondary text-sm mb-1"><span class="text-red-500">*</span> <span data-i18n="select_file">Select File</span></label>
                <input type="file" id="upload-file" accept="image/*" class="w-full px-4 py-2 input-field rounded-lg">
            </div>
            <button onclick="uploadImage()" class="w-full px-4 py-2 btn-primary text-white rounded-lg mb-2" data-i18n="upload">Upload</button>
            <button onclick="hideUploadModal()" class="w-full px-4 py-2 btn-secondary rounded-lg" data-i18n="cancel">Cancel</button>
        </div>
    </div>

    <script>
        // Show loading immediately to prevent flash
        (function() {
            const loading = document.createElement('div');
            loading.id = 'admin-loading-overlay';
            loading.className = 'fixed inset-0 bg-slate-900/80 flex items-center justify-center z-[9999] transition-opacity duration-200';
            loading.innerHTML = `
                <div class="glass rounded-xl p-6 flex items-center space-x-3">
                    <svg class="animate-spin h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-primary">Loading...</span>
                </div>
            `;
            document.body.appendChild(loading);
        })();

        let currentPath = '';
        let currentStorage = 'default';

        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize admin layout
            await AdminComponents.init('images');

            // Load images
            loadImages();

            // Hide loading after data loaded
            const loading = document.getElementById('admin-loading-overlay');
            if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => loading.remove(), 200);
            }
        });

        async function loadImages() {
            currentStorage = document.getElementById('storageSpace').value;
            try {
                const response = await fetch(`/api/image/list?storageSpace=${currentStorage}&path=${encodeURIComponent(currentPath)}`);
                const data = await response.json();

                renderImages(data.images, data.directories);
                updateBreadcrumb();
            } catch (error) {
                console.error('Failed to load images:', error);
            }
        }

        function renderImages(images, directories) {
            const container = document.getElementById('images-container');
            let html = '';

            // Render directories
            directories.forEach(dir => {
                const name = dir.split('/').pop();
                html += `
                    <div class="p-4 rounded-lg card-item hover:bg-elevated transition-colors cursor-pointer" onclick="navigate('${dir}')">
                        <div class="flex items-center space-x-3">
                            <svg class="w-8 h-8 text-warning" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                            <span class="text-primary">${name}</span>
                        </div>
                    </div>
                `;
            });

            // Render images
            images.forEach(img => {
                const space = img.storageSpace || currentStorage;
                const thumbUrl = img.hasThumbnail
                    ? `/api/image/thumb/${space}/${img.path}`
                    : `/api/image/${space}/${img.path}`;

                html += `
                    <div class="p-4 rounded-lg card-item hover:bg-elevated transition-colors">
                        <div class="relative mb-3">
                            <img src="${thumbUrl}" alt="${img.name}" class="w-full h-32 object-cover rounded-lg">
                            <button onclick="deleteImage('${img.path}')" class="absolute top-2 right-2 p-1 bg-red-600 hover:bg-red-700 text-white rounded-md">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                        <p class="text-primary text-sm truncate">${img.name}</p>
                        <p class="text-muted text-xs">${img.getFormattedSize()}</p>
                    </div>
                `;
            });

            container.innerHTML = html || '<p class="text-muted col-span-full text-center py-8" data-i18n="no_data">No images found</p>';
            i18n.applyLanguage();
        }

        function navigate(path) {
            currentPath = path;
            loadImages();
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            if (!currentPath) {
                breadcrumb.innerHTML = '<span class="text-white">Root</span>';
                return;
            }

            const parts = currentPath.split('/');
            let html = '<span class="text-white cursor-pointer hover:text-blue-400" onclick="navigate(\'\')">Root</span>';
            let accum = '';
            parts.forEach((part, index) => {
                accum += (index > 0 ? '/' : '') + part;
                html += ' <span class="text-slate-500">/</span> ';
                if (index === parts.length - 1) {
                    html += `<span class="text-white">${part}</span>`;
                } else {
                    html += `<span class="text-blue-400 cursor-pointer hover:text-blue-300" onclick="navigate('${accum}')">${part}</span>`;
                }
            });
            breadcrumb.innerHTML = html;
        }

        function showUploadModal() {
            document.getElementById('upload-modal').classList.remove('hidden');
        }

        function hideUploadModal() {
            document.getElementById('upload-modal').classList.add('hidden');
        }

        async function uploadImage() {
            const fileInput = document.getElementById('upload-file');
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('storageSpace', currentStorage);

            try {
                const response = await fetch('/api/admin/upload', { method: 'POST', body: formData });
                const result = await response.json();

                if (result.success) {
                    hideUploadModal();
                    loadImages();
                    Toast.success(i18n.t('success'));
                } else {
                    Toast.error(result.error);
                }
            } catch (error) {
                Toast.error('Upload failed');
            }
        }

        async function deleteImage(path) {
            const confirmed = await Confirm.danger(i18n.t('confirm_delete'));
            if (!confirmed) return;

            try {
                const response = await fetch(`/api/image/${currentStorage}/${path}`, { method: 'DELETE' });
                const result = await response.json();

                if (result.success) {
                    loadImages();
                    Toast.success(i18n.t('success'));
                } else {
                    Toast.error(result.error);
                }
            } catch (error) {
                Toast.error('Delete failed');
            }
        }
    </script>
</body>
</html>
