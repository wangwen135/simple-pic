                    }
                }

                // Fallback: create temporary textarea
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                textarea.style.top = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    textarea.remove();
                    return true;
                } catch (err) {
                    textarea.remove();
                    console.error('Copy failed:', err);
                    return false;
                }
            },

            /**
             * Copy selected link
             */
            async copySelectedLink() {
                const linkPreview = document.getElementById('linkPreview');
                const success = await this.copyToClipboard(linkPreview.value);
                if (success) {
                    Toast.success('链接已复制');
                } else {
                    Toast.error('复制失败');
                }
            },

            /**
             * Copy single image link (direct format for list view)
             */
            async copySingleImageLink(path, storage) {
                const url = `${window.location.origin}/image/${storage}/${path}`;
                const success = await this.copyToClipboard(url);
                if (success) {
                    Toast.success('链接已复制');
                } else {
                    Toast.error('复制失败');
                }
            },

            /**
             * Hide loading
             */
            hideLoading() {
                const loading = document.getElementById('admin-loading-overlay');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.remove(), 200);
                }
            },

            /**
             * Format size
             */
            formatSize(bytes) {
                if (bytes >= 1024 * 1024 * 1024) {
                    return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
                } else if (bytes >= 1024 * 1024) {
                    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
                } else if (bytes >= 1024) {
                    return (bytes / 1024).toFixed(2) + ' KB';
                }
                return bytes + ' B';
            },

            /**
             * Format date
             */
            formatDate(timestamp) {
                const date = new Date(timestamp);
                return date.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                }) + ' ' + date.toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
        };

        // File input handler
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('uploadFileInput').addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                if (files.length > 0) {
                    ImageManager.state.uploadFiles = files;
                    ImageManager.renderUploadQueue();
                }
            });
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            // Wait for AdminComponents to finish loading
            if (typeof AdminComponents !== 'undefined' && AdminComponents.init) {
                await AdminComponents.init('images');
            }

            // Wait for Confirm object to be available
            let retries = 0;
            while (typeof Confirm === 'undefined' && retries < 50) {
                await new Promise(resolve => setTimeout(resolve, 50));
                retries++;
            }
            if (typeof Confirm === 'undefined') {
                console.error('Confirm object not available after waiting');
            }

            ImageManager.init();
        });
    </script>
</body>
</html>
