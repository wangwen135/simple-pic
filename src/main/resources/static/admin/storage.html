<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="title_storage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Pic - Storage</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="/lib/tailwindcss.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/modal.js"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/lib/inter-font.css">
    <script src="/js/admin-components.js"></script>
</head>
<body class="gradient-bg h-screen overflow-hidden flex flex-col">
    <!-- Component containers -->
    <div id="header-container" class="flex-shrink-0"></div>
    <div class="flex flex-1 overflow-hidden">
        <div id="sidebar-container" class="flex-shrink-0"></div>
        <main class="flex-1 overflow-y-auto p-8">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold" data-i18n="storage_management">Storage Spaces</h1>
                <button onclick="showCreateModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors" data-i18n="create_storage">Create Storage</button>
            </div>
            <div class="glass rounded-xl p-6">
                <div id="storage-list" class="space-y-4">
                    <p class="text-slate-500 text-center py-8">Loading...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div id="modal-container"></div>

    <script>
        // Show loading immediately to prevent flash
        (function() {
            const loading = document.createElement('div');
            loading.id = 'admin-loading-overlay';
            loading.className = 'fixed inset-0 bg-slate-900/80 flex items-center justify-center z-[9999] transition-opacity duration-200';
            loading.innerHTML = `
                <div class="glass rounded-xl p-6 flex items-center space-x-3">
                    <svg class="animate-spin h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-primary">Loading...</span>
                </div>
            `;
            document.body.appendChild(loading);
        })();

        let currentStorageData = null;
        let isEditing = false;

        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize admin layout
            await AdminComponents.init('storage');

            // Load storages
            loadStorages();

            // Hide loading after data loaded
            const loading = document.getElementById('admin-loading-overlay');
            if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => loading.remove(), 200);
            }
        });

        async function loadStorages() {
            try {
                const response = await fetch('/api/admin/storages');
                const storages = await response.json();
                allStorages = storages;
                renderStorages(storages);
            } catch (error) {
                console.error('Failed to load storages:', error);
            }
        }

        function renderStorages(storages) {
            const container = document.getElementById('storage-list');
            container.innerHTML = storages.map(s => `
                <div class="p-4 rounded-lg card-item flex items-center justify-between">
                    <div>
                        <h3 class="text-primary font-medium">${s.name}</h3>
                        <p class="text-secondary text-sm">${s.path}</p>
                        <div class="flex items-center space-x-4 mt-2 text-sm">
                            <span class="text-muted">${s.usedSize} / ${s.maxSize}</span>
                            <span class="text-muted">${s.imageCount} images</span>
                            ${s.allowAnonymous ? '<span class="text-accent" data-i18n="allow_anonymous">Allow Anonymous</span>' : ''}
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="editStorage('${s.name}')" class="p-2 btn-secondary rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button onclick="deleteStorage('${s.name}')" class="p-2 bg-red-600 hover:bg-red-700 text-white rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('') || '<p class="text-muted text-center py-8" data-i18n="no_data">No storage spaces found</p>';
            i18n.applyLanguage();
        }

        let allStorages = [];
        let currentModalInstance = null;

        function getFormContent() {
            return `
                <div class="space-y-4">
                    <div>
                        <label class="block text-secondary text-sm mb-1"><span class="text-red-500">*</span> <span data-i18n="storage_name">Name</span></label>
                        <input type="text" id="create-name" class="w-full px-4 py-2 input-field rounded-lg" placeholder="storage-name">
                        <p class="text-xs text-muted mt-1" data-i18n="storage_name_hint">英文字母、数字、下划线、中划线</p>
                    </div>
                    <div>
                        <label class="block text-secondary text-sm mb-1"><span class="text-red-500">*</span> <span data-i18n="storage_path">Path</span></label>
                        <input type="text" id="create-path" class="w-full px-4 py-2 input-field rounded-lg" placeholder="./storage/custom">
                        <p class="text-xs text-muted mt-1" data-i18n="storage_path_hint">绝对路径或相对路径，不存在将自动创建</p>
                    </div>
                    <div>
                        <label class="block text-secondary text-sm mb-1"><span class="text-red-500">*</span> <span data-i18n="max_size">Max Size</span></label>
                        <div class="flex items-center space-x-2">
                            <input type="number" id="create-size-value" class="flex-1 px-4 py-2 input-field rounded-lg" placeholder="1" min="1">
                            <select id="create-size-unit" class="px-4 py-2 input-field rounded-lg">
                                <option value="MB" data-i18n="unit_mb">MB</option>
                                <option value="GB" selected data-i18n="unit_gb">GB</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-secondary text-sm mb-1"><span class="text-red-500">*</span> <span data-i18n="domain">URL Prefix</span></label>
                        <input type="text" id="create-url-prefix" class="w-full px-4 py-2 input-field rounded-lg" placeholder="http://192.168.31.88:8080/image/笔记/">
                        <p class="text-xs text-muted mt-1" data-i18n="domain_hint">完整的 URL，如 http://192.168.31.88:8080/image/笔记/</p>
                        <p class="text-xs text-muted">访问地址前缀。上传后返回的图片地址 = 此前缀 + 相对存储路径</p>
                        <p class="text-xs text-muted">nginx 配置: location /image/笔记/ { alias /path/to/storage/; }</p>
                    </div>
                    <div>
                        <label class="flex items-center space-x-2">
                            <input type="checkbox" id="create-anonymous" class="w-4 h-4 rounded text-blue-600">
                            <span class="text-secondary" data-i18n="allow_anonymous">Allow Anonymous Upload</span>
                        </label>
                    </div>
                </div>
            `;
        }

        function showCreateModal() {
            isEditing = false;
            currentModalInstance = Modal.show({
                title: i18n.t('create_storage'),
                content: getFormContent(),
                confirmText: i18n.t('save'),
                cancelText: i18n.t('cancel'),
                onConfirm: () => saveStorage(),
                size: 'medium'
            });

            // Initialize form values
            document.getElementById('create-name').value = '';
            document.getElementById('create-name').disabled = false;
            document.getElementById('create-path').value = '';
            document.getElementById('create-size-value').value = '1';
            document.getElementById('create-size-unit').value = 'GB';
            document.getElementById('create-url-prefix').value = '';
            document.getElementById('create-anonymous').checked = false;

            // Apply language
            i18n.applyLanguage();
        }

        async function editStorage(name) {
            try {
                const response = await fetch('/api/admin/storages');
                const storages = await response.json();
                const storage = storages.find(s => s.name === name);
                if (storage) {
                    currentStorageData = storage;
                    isEditing = true;

                    currentModalInstance = Modal.show({
                        title: i18n.t('edit_storage'),
                        content: getFormContent(),
                        confirmText: i18n.t('save'),
                        cancelText: i18n.t('cancel'),
                        onConfirm: () => saveStorage(),
                        size: 'medium'
                    });

                    // Initialize form values
                    document.getElementById('create-name').value = storage.name;
                    document.getElementById('create-name').disabled = true;
                    document.getElementById('create-path').value = storage.path;

                    // Parse size value and unit
                    if (storage.maxSizeBytes) {
                        const sizeInfo = parseSizeBytes(storage.maxSizeBytes);
                        document.getElementById('create-size-value').value = sizeInfo.value;
                        document.getElementById('create-size-unit').value = sizeInfo.unit;
                    } else {
                        document.getElementById('create-size-value').value = '1';
                        document.getElementById('create-size-unit').value = 'GB';
                    }

                    document.getElementById('create-url-prefix').value = storage.urlPrefix || '';
                    document.getElementById('create-anonymous').checked = storage.allowAnonymous || false;

                    // Apply language
                    i18n.applyLanguage();
                }
            } catch (error) {
                console.error('Failed to load storage:', error);
            }
        }

        // Parse bytes to value and unit
        function parseSizeBytes(bytes) {
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            const value = parseFloat((bytes / Math.pow(k, i)).toFixed(2));
            return { value: value, unit: sizes[i] };
        }

        // Validate URL prefix format
        function isValidUrlPrefix(urlPrefix) {
            if (!urlPrefix) return false;
            // Check if it starts with http:// or https://
            if (!urlPrefix.match(/^https?:\/\//i)) {
                return false;
            }
            try {
                const url = new URL(urlPrefix);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch (e) {
                return false;
            }
        }

        // Validate storage name
        function isValidStorageName(name) {
            if (!name) return false;
            // Only allow letters, numbers, underscore, hyphen, and Chinese characters
            return /^[\u4e00-\u9fa5a-zA-Z0-9_-]+$/.test(name);
        }

        // Format size value to string
        function formatSizeToString() {
            const value = document.getElementById('create-size-value').value;
            const unit = document.getElementById('create-size-unit').value;
            return value + unit;
        }

        async function saveStorage() {
            const name = document.getElementById('create-name').value.trim();
            const path = document.getElementById('create-path').value.trim();
            const urlPrefix = document.getElementById('create-url-prefix').value.trim();
            const allowAnonymous = document.getElementById('create-anonymous').checked;
            const maxSize = formatSizeToString();

            // Validation
            if (!name) {
                Toast.error(i18n.t('error_name_required'));
                return false;
            }

            if (!isValidStorageName(name)) {
                Toast.error(i18n.t('error_name_invalid'));
                return false;
            }

            // Check for duplicate name when creating new storage
            if (!isEditing && allStorages.some(s => s.name === name)) {
                Toast.error(i18n.t('error_name_exists'));
                return false;
            }

            if (!path) {
                Toast.error(i18n.t('error_path_required'));
                return false;
            }

            if (!maxSize) {
                Toast.error(i18n.t('error_size_required'));
                return false;
            }

            if (!urlPrefix) {
                Toast.error('URL Prefix is required');
                return false;
            }

            if (!isValidUrlPrefix(urlPrefix)) {
                Toast.error('Invalid URL Prefix format');
                return false;
            }

            if (isEditing) {
                try {
                    const response = await fetch(`/api/admin/storages/${name}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path, maxSize, urlPrefix, allowAnonymous })
                    });
                    const result = await response.json();

                    if (result.success) {
                        loadStorages();
                        Toast.success(i18n.t('success'));
                        return true;
                    } else {
                        Toast.error(result.error || i18n.t('error_save_failed'));
                        return false;
                    }
                } catch (error) {
                    Toast.error(i18n.t('error_save_failed'));
                    return false;
                }
            } else {
                try {
                    const response = await fetch('/api/admin/storages', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, path, maxSize, urlPrefix, allowAnonymous })
                    });
                    const result = await response.json();

                    if (result.success) {
                        loadStorages();
                        Toast.success(i18n.t('success'));
                        return true;
                    } else {
                        Toast.error(result.error || i18n.t('error_create_failed'));
                        return false;
                    }
                } catch (error) {
                    Toast.error(i18n.t('error_create_failed'));
                    return false;
                }
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function deleteStorage(name) {
            Modal.confirm({
                title: i18n.t('delete_storage'),
                content: `<p class="text-primary">${i18n.t('confirm_delete')} "${name}"?</p>`,
                confirmText: i18n.t('delete'),
                cancelText: i18n.t('cancel'),
                onConfirm: async () => {
                    try {
                        const response = await fetch(`/api/admin/storages/${name}`, { method: 'DELETE' });
                        const result = await response.json();

                        if (result.success) {
                            loadStorages();
                            Toast.success(i18n.t('success'));
                            return true;
                        } else {
                            Toast.error(result.error);
                            return false;
                        }
                    } catch (error) {
                        Toast.error('Failed to delete storage');
                        return false;
                    }
                },
                size: 'small',
                closable: false
            });
        }
    </script>
</body>
</html>
