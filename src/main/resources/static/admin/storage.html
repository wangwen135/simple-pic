<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="title_storage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Pic - Storage</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="/lib/tailwindcss.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/modal.js"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/lib/inter-font.css">
</head>
<body class="gradient-bg h-screen">
    <!-- Header -->
    <header class="glass border-b separator h-16 flex items-center justify-between px-6 sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold" data-i18n="app_title">Simple-Pic</h1>
        </div>

        <div class="flex items-center space-x-4">
            <a href="/upload.html" class="flex items-center space-x-2 px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                <span data-i18n="upload">Upload</span>
            </a>

            <div class="flex items-center space-x-2 px-3 py-2 rounded-lg user-info">
                <svg class="w-4 h-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                <span id="username" class="text-sm text-primary">admin</span>
            </div>

            <button onclick="logout()" class="logout-btn flex items-center space-x-2 px-3 py-2 rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                <span class="text-sm" data-i18n="logout">Logout</span>
            </button>

            <div class="w-px h-6 separator"></div>

            <button id="langBtn" class="lang-btn px-3 py-2 rounded-lg text-sm font-medium">
                <span id="langText">中文</span>
            </button>
            <button id="themeBtn" class="theme-btn px-3 py-2 rounded-lg" title="Toggle theme">
                <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
            </button>
        </div>
    </header>

    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-64 h-screen sidebar p-4 border-r separator pt-6">
            <nav class="space-y-1">
                <a href="/admin/dashboard.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    <span data-i18n="dashboard">Dashboard</span>
                </a>
                <a href="/admin/images.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <span data-i18n="image_management">Images</span>
                </a>
                <a href="/admin/storage.html" class="sidebar-link active flex items-center space-x-3 px-3 py-2 rounded-lg text-primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"></path>
                    </svg>
                    <span data-i18n="storage_management">Storage</span>
                </a>
                <a href="/admin/users.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <span data-i18n="user_management">Users</span>
                </a>
                <a href="/admin/system.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <span data-i18n="system_settings">System</span>
                </a>
                <a href="/admin/apikey.html" class="sidebar-link flex items-center space-x-3 px-3 py-2 rounded-lg text-primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                    <span data-i18n="api_key_management">API Keys</span>
                </a>
            </nav>
        </aside>
        <main class="flex-1 p-8">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold" data-i18n="storage_management">Storage Spaces</h1>
                <button onclick="showCreateModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors" data-i18n="create_storage">Create Storage</button>
            </div>
            <div class="glass rounded-xl p-6">
                <div id="storage-list" class="space-y-4">
                    <p class="text-slate-500 text-center py-8">Loading...</p>
                </div>
            </div>
        </main>
    </div>
    <script>
        const sunIcon = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
        const moonIcon = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';

        let currentStorageData = null;
        let isEditing = false;

        document.addEventListener('DOMContentLoaded', () => {
            updateThemeIcon();
            updateLangText();
            loadUserInfo();
            loadStorages();
        });

        // Load user info
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/auth/me');
                const data = await response.json();
                if (data.success && data.user) {
                    document.getElementById('username').textContent = data.user.username;
                }
            } catch (error) {
                console.error('Failed to load user info');
            }
        }

        document.getElementById('themeBtn').addEventListener('click', () => {
            i18n.toggleTheme();
            updateThemeIcon();
        });

        function updateThemeIcon() {
            const theme = i18n.getTheme();
            document.getElementById('themeIcon').innerHTML = theme === 'light' ? sunIcon : moonIcon;
        }

        document.getElementById('langBtn').addEventListener('click', () => {
            i18n.toggleLanguage();
            updateLangText();
        });

        function updateLangText() {
            const lang = i18n.getLanguage();
            document.getElementById('langText').textContent = lang === 'zh' ? '中文' : 'EN';
        }

        async function loadStorages() {
            try {
                const response = await fetch('/api/admin/storages');
                const storages = await response.json();
                allStorages = storages;
                renderStorages(storages);
            } catch (error) {
                console.error('Failed to load storages:', error);
            }
        }

        function renderStorages(storages) {
            const container = document.getElementById('storage-list');
            container.innerHTML = storages.map(s => `
                <div class="p-4 rounded-lg card-item flex items-center justify-between">
                    <div>
                        <h3 class="text-primary font-medium">${s.name}</h3>
                        <p class="text-secondary text-sm">${s.path}</p>
                        <div class="flex items-center space-x-4 mt-2 text-sm">
                            <span class="text-muted">${s.usedSize} / ${s.maxSize}</span>
                            <span class="text-muted">${s.imageCount} images</span>
                            ${s.allowAnonymous ? '<span class="text-accent" data-i18n="allow_anonymous">Allow Anonymous</span>' : ''}
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="editStorage('${s.name}')" class="p-2 btn-secondary rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button onclick="deleteStorage('${s.name}')" class="p-2 bg-red-600 hover:bg-red-700 text-white rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('') || '<p class="text-muted text-center py-8" data-i18n="no_data">No storage spaces found</p>';
            i18n.applyLanguage();
        }

        let allStorages = [];
        let currentModalInstance = null;

        function getFormContent() {
            return `
                <div class="space-y-4">
                    <div>
                        <label class="block text-secondary text-sm mb-1" data-i18n="storage_name">Name <span class="text-red-500">*</span></label>
                        <input type="text" id="create-name" class="w-full px-4 py-2 input-field rounded-lg" placeholder="storage-name">
                        <p class="text-xs text-muted mt-1" data-i18n="storage_name_hint">英文字母、数字、下划线、中划线</p>
                    </div>
                    <div>
                        <label class="block text-secondary text-sm mb-1" data-i18n="storage_path">Path <span class="text-red-500">*</span></label>
                        <input type="text" id="create-path" class="w-full px-4 py-2 input-field rounded-lg" placeholder="./storage/custom">
                        <p class="text-xs text-muted mt-1" data-i18n="storage_path_hint">绝对路径或相对路径，不存在将自动创建</p>
                    </div>
                    <div>
                        <label class="block text-secondary text-sm mb-1" data-i18n="max_size">Max Size <span class="text-red-500">*</span></label>
                        <div class="flex items-center space-x-2">
                            <input type="number" id="create-size-value" class="flex-1 px-4 py-2 input-field rounded-lg" placeholder="10" min="1">
                            <select id="create-size-unit" class="px-4 py-2 input-field rounded-lg">
                                <option value="MB" data-i18n="unit_mb">MB</option>
                                <option value="GB" selected data-i18n="unit_gb">GB</option>
                                <option value="TB" data-i18n="unit_tb">TB</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-secondary text-sm mb-1" data-i18n="domain">Domain <span class="text-red-500">*</span></label>
                        <input type="text" id="create-domain" class="w-full px-4 py-2 input-field rounded-lg" placeholder="http://localhost:8080">
                        <p class="text-xs text-muted mt-1" data-i18n="domain_hint">完整的 URL，如 http://localhost:8080 或 https://example.com</p>
                    </div>
                    <div>
                        <label class="flex items-center space-x-2">
                            <input type="checkbox" id="create-anonymous" class="w-4 h-4 rounded text-blue-600">
                            <span class="text-secondary" data-i18n="allow_anonymous">Allow Anonymous Upload</span>
                        </label>
                    </div>
                </div>
            `;
        }

        function showCreateModal() {
            isEditing = false;
            currentModalInstance = Modal.show({
                title: i18n.t('create_storage'),
                content: getFormContent(),
                confirmText: i18n.t('save'),
                cancelText: i18n.t('cancel'),
                onConfirm: () => saveStorage(),
                size: 'medium'
            });

            // Initialize form values
            document.getElementById('create-name').value = '';
            document.getElementById('create-name').disabled = false;
            document.getElementById('create-path').value = '';
            document.getElementById('create-size-value').value = '10';
            document.getElementById('create-size-unit').value = 'GB';
            document.getElementById('create-domain').value = '';
            document.getElementById('create-anonymous').checked = false;

            // Apply language
            i18n.applyLanguage();
        }

        async function editStorage(name) {
            try {
                const response = await fetch('/api/admin/storages');
                const storages = await response.json();
                const storage = storages.find(s => s.name === name);
                if (storage) {
                    currentStorageData = storage;
                    isEditing = true;

                    currentModalInstance = Modal.show({
                        title: i18n.t('edit_storage'),
                        content: getFormContent(),
                        confirmText: i18n.t('save'),
                        cancelText: i18n.t('cancel'),
                        onConfirm: () => saveStorage(),
                        size: 'medium'
                    });

                    // Initialize form values
                    document.getElementById('create-name').value = storage.name;
                    document.getElementById('create-name').disabled = true;
                    document.getElementById('create-path').value = storage.path;

                    // Parse size value and unit
                    if (storage.maxSizeBytes) {
                        const sizeInfo = parseSizeBytes(storage.maxSizeBytes);
                        document.getElementById('create-size-value').value = sizeInfo.value;
                        document.getElementById('create-size-unit').value = sizeInfo.unit;
                    } else {
                        document.getElementById('create-size-value').value = '10';
                        document.getElementById('create-size-unit').value = 'GB';
                    }

                    document.getElementById('create-domain').value = storage.domain;
                    document.getElementById('create-anonymous').checked = storage.allowAnonymous || false;

                    // Apply language
                    i18n.applyLanguage();
                }
            } catch (error) {
                console.error('Failed to load storage:', error);
            }
        }

        // Parse bytes to value and unit
        function parseSizeBytes(bytes) {
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            const value = parseFloat((bytes / Math.pow(k, i)).toFixed(2));
            return { value: value, unit: sizes[i] };
        }

        // Validate domain format
        function isValidDomain(domain) {
            if (!domain) return false;
            // Check if it starts with http:// or https://
            if (!domain.match(/^https?:\/\//i)) {
                return false;
            }
            try {
                const url = new URL(domain);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch (e) {
                return false;
            }
        }

        // Validate storage name
        function isValidStorageName(name) {
            if (!name) return false;
            // Only allow letters, numbers, underscore, hyphen, and Chinese characters
            return /^[\u4e00-\u9fa5a-zA-Z0-9_-]+$/.test(name);
        }

        // Format size value to string
        function formatSizeToString() {
            const value = document.getElementById('create-size-value').value;
            const unit = document.getElementById('create-size-unit').value;
            return value + unit;
        }

        async function saveStorage() {
            const name = document.getElementById('create-name').value.trim();
            const path = document.getElementById('create-path').value.trim();
            const domain = document.getElementById('create-domain').value.trim();
            const allowAnonymous = document.getElementById('create-anonymous').checked;
            const maxSize = formatSizeToString();

            // Validation
            if (!name) {
                Toast.error(i18n.t('error_name_required'));
                return false;
            }

            if (!isValidStorageName(name)) {
                Toast.error(i18n.t('error_name_invalid'));
                return false;
            }

            // Check for duplicate name when creating new storage
            if (!isEditing && allStorages.some(s => s.name === name)) {
                Toast.error(i18n.t('error_name_exists'));
                return false;
            }

            if (!path) {
                Toast.error(i18n.t('error_path_required'));
                return false;
            }

            if (!maxSize) {
                Toast.error(i18n.t('error_size_required'));
                return false;
            }

            if (!domain) {
                Toast.error(i18n.t('error_domain_required'));
                return false;
            }

            if (!isValidDomain(domain)) {
                Toast.error(i18n.t('error_domain_invalid'));
                return false;
            }

            if (isEditing) {
                try {
                    const response = await fetch(`/api/admin/storages/${name}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path, maxSize, domain, allowAnonymous })
                    });
                    const result = await response.json();

                    if (result.success) {
                        loadStorages();
                        Toast.success(i18n.t('success'));
                        return true;
                    } else {
                        Toast.error(result.error || i18n.t('error_save_failed'));
                        return false;
                    }
                } catch (error) {
                    Toast.error(i18n.t('error_save_failed'));
                    return false;
                }
            } else {
                try {
                    const response = await fetch('/api/admin/storages', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, path, maxSize, domain, allowAnonymous })
                    });
                    const result = await response.json();

                    if (result.success) {
                        loadStorages();
                        Toast.success(i18n.t('success'));
                        return true;
                    } else {
                        Toast.error(result.error || i18n.t('error_create_failed'));
                        return false;
                    }
                } catch (error) {
                    Toast.error(i18n.t('error_create_failed'));
                    return false;
                }
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function deleteStorage(name) {
            Modal.confirm({
                title: i18n.t('delete_storage'),
                content: `<p class="text-primary">${i18n.t('confirm_delete')} "${name}"?</p>`,
                confirmText: i18n.t('delete'),
                cancelText: i18n.t('cancel'),
                onConfirm: async () => {
                    try {
                        const response = await fetch(`/api/admin/storages/${name}`, { method: 'DELETE' });
                        const result = await response.json();

                        if (result.success) {
                            loadStorages();
                            Toast.success(i18n.t('success'));
                            return true;
                        } else {
                            Toast.error(result.error);
                            return false;
                        }
                    } catch (error) {
                        Toast.error('Failed to delete storage');
                        return false;
                    }
                },
                size: 'small',
                closable: false
            });
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
