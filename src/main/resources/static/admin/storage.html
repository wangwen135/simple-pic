<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="title_storage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Pic - Storage</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="/lib/tailwindcss.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/modal.js"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/lib/inter-font.css">
    <script src="/js/admin-components.js"></script>
</head>
<body class="gradient-bg h-screen overflow-hidden flex flex-col">
    <!-- Component containers -->
    <div id="header-container" class="flex-shrink-0"></div>
    <div class="flex flex-1 overflow-hidden">
        <div id="sidebar-container" class="flex-shrink-0"></div>
        <main class="flex-1 overflow-y-auto p-8">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold" data-i18n="storage_management">Storage Spaces</h1>
                <button onclick="showCreateModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors" data-i18n="create_storage">Create Storage</button>
            </div>
            <div class="glass rounded-xl p-6">
                <div id="storage-list" class="space-y-4">
                    <p class="text-slate-500 text-center py-8">Loading...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div id="modal-container"></div>

    <script>
        // Show loading immediately to prevent flash
        (function() {
            const loading = document.createElement('div');
            loading.id = 'admin-loading-overlay';
            loading.className = 'fixed inset-0 bg-slate-900/80 flex items-center justify-center z-[9999] transition-opacity duration-200';
            loading.innerHTML = `
                <div class="glass rounded-xl p-6 flex items-center space-x-3">
                    <svg class="animate-spin h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-primary">Loading...</span>
                </div>
            `;
            document.body.appendChild(loading);
        })();

        let currentStorageData = null;
        let isEditing = false;

        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize admin layout
            await AdminComponents.init('storage');

            // Load storages
            loadStorages();

            // Hide loading after data loaded
            const loading = document.getElementById('admin-loading-overlay');
            if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => loading.remove(), 200);
            }
        });

        async function loadStorages() {
            try {
                const response = await fetch('/api/admin/storages');
                const storages = await response.json();
                allStorages = storages;
                renderStorages(storages);
            } catch (error) {
                console.error('Failed to load storages:', error);
            }
        }

        function renderStorages(storages) {
            const container = document.getElementById('storage-list');
            container.innerHTML = storages.map(s => `
                <div class="p-4 rounded-lg card-item flex items-center justify-between">
                    <div>
                        <h3 class="text-primary font-medium">${s.name}</h3>
                        <div class="flex items-center flex-wrap gap-x-4 gap-y-1 mt-2 text-sm">
                            <span class="text-muted">${s.usedSize} / ${s.maxSize}</span>
                            <span class="text-muted">${s.imageCount} images</span>
                            ${s.allowAnonymous ? '<span class="text-amber-400 text-xs" title="允许未登录用户上传到此存储空间">🔓 匿名上传</span>' : ''}
                            ${s.watermark && s.watermark.enabled ? `<span class="text-blue-400 text-xs" title="水印: ${s.watermark.content || ''} (${s.watermark.position || '右下角'})">💧 水印已启用</span>` : ''}
                        </div>
                        <div class="mt-2 space-y-1 text-sm">
                            <div class="text-secondary flex items-center gap-1.5 group" title="点击复制路径">
                                <span class="text-slate-400">📁</span>
                                <code class="text-slate-600 dark:text-slate-400 font-mono break-all select-all">${s.path}</code>
                            </div>
                            ${s.urlPrefix ? `<div class="text-secondary flex items-center gap-1.5" title="点击复制URL">
                                <span class="text-slate-400">🔗</span>
                                <code class="text-blue-500 dark:text-blue-400 font-mono break-all select-all">${s.urlPrefix}</code>
                            </div>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="showWatermarkModal('${s.name}')" class="p-2 ${s.watermark && s.watermark.enabled ? 'text-blue-500 bg-blue-500/10' : 'text-slate-400 bg-slate-100 dark:bg-slate-700'} rounded-lg transition-colors hover:text-blue-600" title="水印设置">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        </button>
                        <button onclick="editStorage('${s.name}')" class="p-2 btn-secondary rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button onclick="deleteStorage('${s.name}')" class="p-2 bg-red-600 hover:bg-red-700 text-white rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('') || '<p class="text-muted text-center py-8" data-i18n="no_data">No storage spaces found</p>';
            i18n.applyLanguage();
        }

        let allStorages = [];
        let currentModalInstance = null;

        function getFormContent() {
            return `
                <div class="space-y-4">
                    <div>
                        <label class="block text-secondary text-sm mb-1"><span class="text-red-500">*</span> <span data-i18n="storage_name">Name</span></label>
                        <input type="text" id="create-name" class="w-full px-4 py-2 input-field rounded-lg" placeholder="storage-name">
                        <p class="text-xs text-muted mt-1" data-i18n="storage_name_hint">英文字母、数字、下划线、中划线</p>
                    </div>
                    <div>
                        <label class="block text-secondary text-sm mb-1"><span class="text-red-500">*</span> <span data-i18n="storage_path">Path</span></label>
                        <input type="text" id="create-path" class="w-full px-4 py-2 input-field rounded-lg" placeholder="./storage/custom">
                        <p class="text-xs text-muted mt-1" data-i18n="storage_path_hint">绝对路径或相对路径，不存在将自动创建</p>
                    </div>
                    <div>
                        <label class="block text-secondary text-sm mb-1"><span class="text-red-500">*</span> <span data-i18n="max_size">Max Size</span></label>
                        <div class="flex items-center space-x-2">
                            <input type="number" id="create-size-value" class="flex-1 px-4 py-2 input-field rounded-lg" placeholder="1" min="1">
                            <select id="create-size-unit" class="px-4 py-2 input-field rounded-lg">
                                <option value="MB" data-i18n="unit_mb">MB</option>
                                <option value="GB" selected data-i18n="unit_gb">GB</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-secondary text-sm mb-1"><span class="text-red-500">*</span> <span data-i18n="domain">URL Prefix</span></label>

                        <!-- Current system URL prefix example -->
                        <div class="bg-slate-100 dark:bg-slate-800/50 px-3 py-2.5 rounded-lg mb-2 border border-slate-200 dark:border-slate-700">
                            <div class="mb-2">
                                <span class="text-xs text-secondary block mb-1" data-i18n="current_app_url_prefix">本系统访问路径前缀：</span>
                                <span id="url-prefix-example" class="text-xs text-blue-500 dark:text-blue-400 font-mono block"></span>
                            </div>
                            <button type="button" onclick="applyUrlPrefix()" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded transition-colors" data-i18n="apply">应用</button>
                        </div>

                        <input type="text" id="create-url-prefix" class="w-full px-4 py-2 input-field rounded-lg" placeholder="http://192.168.31.88:8080/image/note/">

                        <!-- Description content -->
                        <div class="text-sm text-muted mt-2 space-y-1">
                            <p data-i18n="url_prefix_description_1">上传图片后会根据这个配置来返回图片的访问URL地址</p>
                            <p data-i18n="url_prefix_description_2">返回的图片URL地址为：[访问路径前缀]+[文件相对存储路径]</p>
                            <p data-i18n="url_prefix_description_3">当前系统获取图片的api地址为：/image/{存储空间名称}/{文件相对地址}</p>
                            <p data-i18n="url_prefix_description_4">文件相对地址为：./4位年份/2位月份/UUID文件名</p>
                            <a href="/admin/mount-guide.html" target="_blank" class="text-blue-500 dark:text-blue-400 hover:text-blue-600 dark:hover:text-blue-300 inline-flex items-center gap-1" data-i18n="other_mount_methods">&lt;其他挂载方式说明&gt;</a>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center space-x-2">
                            <input type="checkbox" id="create-anonymous" class="w-4 h-4 rounded text-blue-600">
                            <span class="text-secondary" data-i18n="allow_anonymous">Allow Anonymous Upload</span>
                        </label>
                        <p class="text-xs text-amber-400 mt-1" data-i18n="anonymous_requires_global_enabled">
                            需要在系统设置中启用匿名上传功能
                        </p>
                    </div>
                </div>
            `;
        }

        // Update URL prefix example
        function updateUrlPrefixExample() {
            const nameInput = document.getElementById('create-name');
            const exampleSpan = document.getElementById('url-prefix-example');
            if (!nameInput || !exampleSpan) return;

            const storageName = nameInput.value || '[存储空间名称]';
            const baseUrl = window.location.origin;
            exampleSpan.textContent = `${baseUrl}/images/${storageName}`;
        }

        // Apply URL prefix to input field
        function applyUrlPrefix() {
            const nameInput = document.getElementById('create-name');
            const urlPrefixInput = document.getElementById('create-url-prefix');
            if (!nameInput || !urlPrefixInput) return;

            const storageName = nameInput.value.trim();
            if (!storageName) {
                Toast.error(i18n.t('error_name_required'));
                return;
            }

            const baseUrl = window.location.origin;
            urlPrefixInput.value = `${baseUrl}/images/${storageName}/`;
        }

        // Show nginx configuration explanation
        function showNginxConfig() {
            const nameInput = document.getElementById('create-name');
            const storageName = nameInput ? nameInput.value : 'your-storage-name';
            const storagePath = document.getElementById('create-path')?.value || '/path/to/storage';

            const content = `
                <div class="text-left space-y-4">
                    <h3 class="text-lg font-bold text-primary mb-3">${i18n.t('nginx_config_title')}</h3>

                    <div>
                        <p class="text-secondary mb-2">${i18n.t('nginx_basic_config')}：</p>
                        <pre class="bg-slate-800 p-3 rounded text-xs text-green-400 overflow-x-auto"><code>location /images/${storageName}/ {
    alias ${storagePath}/;
}</code></pre>
                    </div>

                    <div>
                        <p class="text-secondary mb-2">${i18n.t('nginx_advanced_config')}：</p>
                        <pre class="bg-slate-800 p-3 rounded text-xs text-green-400 overflow-x-auto"><code>location /images/${storageName}/ {
    alias ${storagePath}/;

    # 可选：启用文件浏览器
    autoindex on;

    # 可选：设置缓存
    expires 30d;
    add_header Cache-Control "public, immutable";

    # 可选：允许跨域
    add_header Access-Control-Allow-Origin *;
}</code></pre>
                    </div>

                    <div class="text-xs text-muted">
                        <p class="text-yellow-400">⚠️ ${i18n.t('nginx_config_warning')}</p>
                    </div>
                </div>
            `;

            Modal.alert({
                title: i18n.t('nginx_config_title'),
                content: content,
                confirmText: i18n.t('close'),
                size: 'xlarge'
            });
        }

        function showCreateModal() {
            isEditing = false;
            currentStorageData = null;
            currentModalInstance = Modal.show({
                title: i18n.t('create_storage'),
                content: getFormContent(),
                confirmText: i18n.t('save'),
                cancelText: i18n.t('cancel'),
                onConfirm: () => saveStorage(),
                size: 'xxlarge'
            });

            // Initialize form values
            document.getElementById('create-name').value = '';
            document.getElementById('create-name').disabled = false;
            document.getElementById('create-path').value = '';
            document.getElementById('create-size-value').value = '1';
            document.getElementById('create-size-unit').value = 'GB';
            document.getElementById('create-url-prefix').value = '';
            document.getElementById('create-anonymous').checked = false;

            // Initialize URL prefix example
            updateUrlPrefixExample();
            // Add name input listener
            const nameInput = document.getElementById('create-name');
            if (nameInput) {
                nameInput.removeEventListener('input', updateUrlPrefixExample);
                nameInput.addEventListener('input', updateUrlPrefixExample);
            }

            // Apply language
            i18n.applyLanguage();
        }

        async function editStorage(name) {
            try {
                const response = await fetch('/api/admin/storages');
                const storages = await response.json();
                const storage = storages.find(s => s.name === name);
                if (storage) {
                    currentStorageData = storage;
                    isEditing = true;

                    currentModalInstance = Modal.show({
                        title: i18n.t('edit_storage'),
                        content: getFormContent(),
                        confirmText: i18n.t('save'),
                        cancelText: i18n.t('cancel'),
                        onConfirm: () => saveStorage(),
                        size: 'xlarge'
                    });

                    // Initialize form values
                    document.getElementById('create-name').value = storage.name;
                    document.getElementById('create-name').disabled = true;
                    document.getElementById('create-path').value = storage.path;

                    // Parse size value and unit
                    if (storage.maxSizeBytes) {
                        const sizeInfo = parseSizeBytes(storage.maxSizeBytes);
                        document.getElementById('create-size-value').value = sizeInfo.value;
                        document.getElementById('create-size-unit').value = sizeInfo.unit;
                    } else {
                        document.getElementById('create-size-value').value = '1';
                        document.getElementById('create-size-unit').value = 'GB';
                    }

                    document.getElementById('create-url-prefix').value = storage.urlPrefix || '';
                    document.getElementById('create-anonymous').checked = storage.allowAnonymous || false;

                    // Initialize URL prefix example
                    updateUrlPrefixExample();
                    // Add name input listener
                    const nameInput = document.getElementById('create-name');
                    if (nameInput) {
                        nameInput.removeEventListener('input', updateUrlPrefixExample);
                        nameInput.addEventListener('input', updateUrlPrefixExample);
                    }

                    // Apply language
                    i18n.applyLanguage();
                }
            } catch (error) {
                console.error('Failed to load storage:', error);
            }
        }

        // Parse bytes to value and unit
        function parseSizeBytes(bytes) {
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            const value = parseFloat((bytes / Math.pow(k, i)).toFixed(2));
            return { value: value, unit: sizes[i] };
        }

        // Validate URL prefix format
        function isValidUrlPrefix(urlPrefix) {
            if (!urlPrefix) return false;
            // Check if it starts with http:// or https://
            if (!urlPrefix.match(/^https?:\/\//i)) {
                return false;
            }
            try {
                const url = new URL(urlPrefix);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch (e) {
                return false;
            }
        }

        // Validate storage name
        function isValidStorageName(name) {
            if (!name) return false;
            // Only allow letters, numbers, underscore, hyphen, and Chinese characters
            return /^[\u4e00-\u9fa5a-zA-Z0-9_-]+$/.test(name);
        }

        // Format size value to string
        function formatSizeToString() {
            const value = document.getElementById('create-size-value').value;
            const unit = document.getElementById('create-size-unit').value;
            return value + unit;
        }

        function escapeHtml(value) {
            return String(value === undefined || value === null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function wmValue(value, defaultValue) {
            return value === undefined || value === null || value === '' ? defaultValue : value;
        }

        function toggleWmFields() {
            const enabled = document.getElementById('wm-modal-enabled').checked;
            const fields = document.getElementById('wm-modal-fields');
            if (enabled) {
                fields.classList.remove('opacity-40', 'pointer-events-none');
            } else {
                fields.classList.add('opacity-40', 'pointer-events-none');
            }
        }

        function getWatermarkFormValue() {
            return {
                enabled: document.getElementById('wm-modal-enabled').checked,
                type: 'text',
                content: document.getElementById('wm-modal-content').value.trim(),
                position: document.getElementById('wm-modal-position').value,
                opacity: parseFloat(document.getElementById('wm-modal-opacity').value),
                fontSize: parseInt(document.getElementById('wm-modal-font-size').value, 10),
                color: document.getElementById('wm-modal-color').value,
                margin: parseInt(document.getElementById('wm-modal-margin').value, 10),
                outlineEnabled: document.getElementById('wm-modal-outline').checked,
                outlineColor: document.getElementById('wm-modal-outline-color').value,
                shadowEnabled: document.getElementById('wm-modal-shadow').checked,
                tileEnabled: document.getElementById('wm-modal-tile').checked,
                tileGap: parseInt(document.getElementById('wm-modal-tile-gap').value, 10),
                angle: parseInt(document.getElementById('wm-modal-angle').value, 10)
            };
        }

        async function showWatermarkModal(name) {
            const storage = allStorages.find(s => s.name === name);
            if (!storage) return;

            const wm = storage.watermark || {};
            const fontSize = wmValue(wm.fontSize, 20);
            const margin = wmValue(wm.margin, 10);
            const tileGap = wmValue(wm.tileGap, 120);
            const opacity = wmValue(wm.opacity, 0.5);
            const angle = wmValue(wm.angle, 0);
            const color = wmValue(wm.color, '#ffffff');
            const outlineColor = wmValue(wm.outlineColor, '#000000');
            const content = `
                <div class="space-y-4">
                    <div class="rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 bg-slate-900 mx-auto" style="max-width:640px">
                        <canvas id="storage-wm-preview" width="640" height="360" class="w-full" style="display:block;"></canvas>
                    </div>
                    <p class="text-xs text-muted text-center">预览使用示例背景，实际效果根据原图尺寸按相同参数生成</p>
                    <div class="border-t border-slate-200 dark:border-slate-700 pt-4 space-y-4">
                        <div class="flex items-center justify-between rounded-lg border border-slate-200 dark:border-slate-700 px-3 py-2">
                            <label class="flex items-center space-x-2">
                                <input type="checkbox" id="wm-modal-enabled" class="w-4 h-4 rounded text-blue-600" ${wm.enabled ? 'checked' : ''} onchange="toggleWmFields(); updateStorageWmPreview()">
                                <span class="text-secondary">启用水印</span>
                            </label>
                            <span class="text-xs text-muted">动态叠加，不修改原图</span>
                        </div>
                        <div id="wm-modal-fields" class="${wm.enabled ? '' : 'opacity-40 pointer-events-none'} space-y-4">
                        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                            <div class="col-span-2">
                                <label class="block text-secondary text-xs mb-1">水印内容</label>
                                <input type="text" id="wm-modal-content" class="w-full px-3 py-2 input-field rounded-lg text-sm" value="${escapeHtml(wm.content || '')}" placeholder="例如: © My Site" oninput="updateStorageWmPreview()">
                            </div>
                            <div>
                                <label class="block text-secondary text-xs mb-1">位置</label>
                                <select id="wm-modal-position" class="w-full px-3 py-2 input-field rounded-lg text-sm" onchange="updateStorageWmPreview()">
                                    <option value="top-left" ${wm.position === 'top-left' ? 'selected' : ''}>左上角</option>
                                    <option value="top-right" ${wm.position === 'top-right' ? 'selected' : ''}>右上角</option>
                                    <option value="bottom-left" ${wm.position === 'bottom-left' ? 'selected' : ''}>左下角</option>
                                    <option value="bottom-right" ${!wm.position || wm.position === 'bottom-right' ? 'selected' : ''}>右下角</option>
                                    <option value="center" ${wm.position === 'center' ? 'selected' : ''}>居中</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-secondary text-xs mb-1">文字颜色</label>
                                <input type="color" id="wm-modal-color" class="w-full h-10 input-field rounded-lg p-1" value="${escapeHtml(color)}" oninput="updateStorageWmPreview()">
                            </div>
                            <div>
                                <label class="block text-secondary text-xs mb-1">字号: <span id="wm-modal-font-size-value">${fontSize}</span>px</label>
                                <input type="range" id="wm-modal-font-size" min="12" max="96" step="1" value="${fontSize}" class="w-full accent-blue-600"
                                    oninput="document.getElementById('wm-modal-font-size-value').textContent=this.value; updateStorageWmPreview()">
                            </div>
                            <div>
                                <label class="block text-secondary text-xs mb-1">边距: <span id="wm-modal-margin-value">${margin}</span>px</label>
                                <input type="range" id="wm-modal-margin" min="0" max="100" step="1" value="${margin}" class="w-full accent-blue-600"
                                    oninput="document.getElementById('wm-modal-margin-value').textContent=this.value; updateStorageWmPreview()">
                            </div>
                            <div>
                                <label class="block text-secondary text-xs mb-1">透明度: <span id="wm-modal-opacity-value">${opacity}</span></label>
                                <input type="range" id="wm-modal-opacity" min="0.1" max="1" step="0.05" value="${opacity}" class="w-full accent-blue-600"
                                    oninput="document.getElementById('wm-modal-opacity-value').textContent=this.value; updateStorageWmPreview()">
                            </div>
                            <div>
                                <label class="block text-secondary text-xs mb-1">角度: <span id="wm-modal-angle-value">${angle}</span>°</label>
                                <input type="range" id="wm-modal-angle" min="-90" max="90" step="1" value="${angle}" class="w-full accent-blue-600"
                                    oninput="document.getElementById('wm-modal-angle-value').textContent=this.value; updateStorageWmPreview()">
                            </div>
                        </div>
                        <div class="flex flex-wrap items-end gap-3">
                            <label class="flex items-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 px-3 py-2">
                                <input type="checkbox" id="wm-modal-outline" class="w-4 h-4 rounded text-blue-600" ${wm.outlineEnabled !== false ? 'checked' : ''} onchange="updateStorageWmPreview()">
                                <span class="text-secondary text-sm">描边</span>
                            </label>
                            <div>
                                <label class="block text-secondary text-xs mb-1">描边颜色</label>
                                <input type="color" id="wm-modal-outline-color" class="h-10 w-14 input-field rounded-lg p-1" value="${escapeHtml(outlineColor)}" oninput="updateStorageWmPreview()">
                            </div>
                            <label class="flex items-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 px-3 py-2">
                                <input type="checkbox" id="wm-modal-shadow" class="w-4 h-4 rounded text-blue-600" ${wm.shadowEnabled !== false ? 'checked' : ''} onchange="updateStorageWmPreview()">
                                <span class="text-secondary text-sm">阴影</span>
                            </label>
                            <label class="flex items-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 px-3 py-2">
                                <input type="checkbox" id="wm-modal-tile" class="w-4 h-4 rounded text-blue-600" ${wm.tileEnabled ? 'checked' : ''} onchange="updateStorageWmPreview()">
                                <span class="text-secondary text-sm">平铺</span>
                            </label>
                            <div class="w-40">
                                <label class="block text-secondary text-xs mb-1">间距: <span id="wm-modal-tile-gap-value">${tileGap}</span>px</label>
                                <input type="range" id="wm-modal-tile-gap" min="40" max="400" step="10" value="${tileGap}" class="w-full accent-blue-600"
                                    oninput="document.getElementById('wm-modal-tile-gap-value').textContent=this.value; updateStorageWmPreview()">
                            </div>
                        </div>
                        </div>
                    </div>
                </div>
            `;

            Modal.show({
                title: `水印设置 - ${name}`,
                content: content,
                confirmText: i18n.t('save'),
                cancelText: i18n.t('cancel'),
                horizontalButtons: true,
                onConfirm: async () => {
                    const watermark = getWatermarkFormValue();

                    try {
                        const response = await fetch(`/api/admin/storages/${name}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                path: storage.path,
                                maxSize: storage.maxSize,
                                urlPrefix: storage.urlPrefix,
                                allowAnonymous: storage.allowAnonymous,
                                watermark: watermark
                            })
                        });
                        const result = await response.json();
                        if (result.success) {
                            loadStorages();
                            Toast.success(i18n.t('success'));
                            return true;
                        } else {
                            Toast.error(result.error || i18n.t('error_save_failed'));
                            return false;
                        }
                    } catch (error) {
                        Toast.error(i18n.t('error_save_failed'));
                        return false;
                    }
                },
                size: 'full'
            });

            // Initialize preview after modal renders
            setTimeout(updateStorageWmPreview, 50);
        }

        function updateStorageWmPreview() {
            const canvas = document.getElementById('storage-wm-preview');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;

            // Sample background
            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, '#1e293b');
            grad.addColorStop(0.4, '#2563eb');
            grad.addColorStop(1, '#16a34a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = 'rgba(255,255,255,0.16)';
            ctx.fillRect(34, 34, 120, 72);
            ctx.fillStyle = 'rgba(15,23,42,0.28)';
            ctx.fillRect(178, 116, 136, 98);
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.beginPath(); ctx.arc(w * 0.78, h * 0.26, 42, 0, Math.PI * 2); ctx.fill();

            const enabled = document.getElementById('wm-modal-enabled');
            if (!enabled || !enabled.checked) return;

            const wm = getWatermarkFormValue();
            if (!wm.content) return;

            ctx.save();
            ctx.globalAlpha = wm.opacity;
            ctx.font = `bold ${wm.fontSize}px Arial, sans-serif`;
            ctx.textBaseline = 'top';

            const drawText = (x, y) => {
                const centerX = x + textW / 2;
                const centerY = y + textH / 2;
                ctx.save();
                if (wm.angle !== 0) {
                    ctx.translate(centerX, centerY);
                    ctx.rotate(wm.angle * Math.PI / 180);
                    ctx.translate(-centerX, -centerY);
                }
                if (wm.shadowEnabled) {
                    ctx.fillStyle = 'rgba(0,0,0,0.55)';
                    ctx.fillText(wm.content, x + 2, y + 2);
                }
                if (wm.outlineEnabled) {
                    ctx.lineWidth = Math.max(1, wm.fontSize / 12);
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = wm.outlineColor;
                    ctx.strokeText(wm.content, x, y);
                }
                ctx.fillStyle = wm.color;
                ctx.fillText(wm.content, x, y);
                ctx.restore();
            };

            const metrics = ctx.measureText(wm.content);
            const textW = metrics.width;
            const textH = wm.fontSize * 1.2;

            if (wm.tileEnabled) {
                for (let y = wm.margin; y < h + textH; y += textH + wm.tileGap) {
                    for (let x = wm.margin; x < w + textW; x += textW + wm.tileGap) {
                        drawText(x, y);
                    }
                }
                ctx.restore();
                return;
            }

            let x, y;
            switch (wm.position) {
                case 'top-left': x = wm.margin; y = wm.margin; break;
                case 'top-right': x = w - textW - wm.margin; y = wm.margin; break;
                case 'bottom-left': x = wm.margin; y = h - textH - wm.margin; break;
                case 'center': x = (w - textW) / 2; y = (h - textH) / 2; break;
                default: x = w - textW - wm.margin; y = h - textH - wm.margin;
            }
            drawText(x, y);
            ctx.restore();
        }

        async function saveStorage() {
            const name = document.getElementById('create-name').value.trim();
            const path = document.getElementById('create-path').value.trim();
            const urlPrefix = document.getElementById('create-url-prefix').value.trim();
            const allowAnonymous = document.getElementById('create-anonymous').checked;
            const maxSize = formatSizeToString();

            // Validation
            if (!name) {
                Toast.error(i18n.t('error_name_required'));
                return false;
            }

            if (!isValidStorageName(name)) {
                Toast.error(i18n.t('error_name_invalid'));
                return false;
            }

            // Check for duplicate name when creating new storage
            if (!isEditing && allStorages.some(s => s.name === name)) {
                Toast.error(i18n.t('error_name_exists'));
                return false;
            }

            if (!path) {
                Toast.error(i18n.t('error_path_required'));
                return false;
            }

            if (!maxSize) {
                Toast.error(i18n.t('error_size_required'));
                return false;
            }

            if (!urlPrefix) {
                Toast.error('URL Prefix is required');
                return false;
            }

            if (!isValidUrlPrefix(urlPrefix)) {
                Toast.error('Invalid URL Prefix format');
                return false;
            }

            if (isEditing) {
                try {
                    const response = await fetch(`/api/admin/storages/${name}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path, maxSize, urlPrefix, allowAnonymous, watermark: currentStorageData ? currentStorageData.watermark : null })
                    });
                    const result = await response.json();

                    if (result.success) {
                        loadStorages();
                        Toast.success(i18n.t('success'));
                        return true;
                    } else {
                        Toast.error(result.error || i18n.t('error_save_failed'));
                        return false;
                    }
                } catch (error) {
                    Toast.error(i18n.t('error_save_failed'));
                    return false;
                }
            } else {
                try {
                    const response = await fetch('/api/admin/storages', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, path, maxSize, urlPrefix, allowAnonymous })
                    });
                    const result = await response.json();

                    if (result.success) {
                        loadStorages();
                        Toast.success(i18n.t('success'));
                        return true;
                    } else {
                        Toast.error(result.error || i18n.t('error_create_failed'));
                        return false;
                    }
                } catch (error) {
                    Toast.error(i18n.t('error_create_failed'));
                    return false;
                }
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function deleteStorage(name) {
            Modal.confirm({
                title: i18n.t('delete_storage'),
                content: `<p class="text-primary">${i18n.t('confirm_delete')} "${name}"?</p>`,
                confirmText: i18n.t('delete'),
                cancelText: i18n.t('cancel'),
                onConfirm: async () => {
                    try {
                        const response = await fetch(`/api/admin/storages/${name}`, { method: 'DELETE' });
                        const result = await response.json();

                        if (result.success) {
                            loadStorages();
                            Toast.success(i18n.t('success'));
                            return true;
                        } else {
                            Toast.error(result.error);
                            return false;
                        }
                    } catch (error) {
                        Toast.error('Failed to delete storage');
                        return false;
                    }
                },
                size: 'small',
                closable: false
            });
        }
    </script>
</body>
