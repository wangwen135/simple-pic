<!DOCTYPE html>
<html lang="zh-CN" data-i18n-title="title_upload">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Pic - Upload</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="/lib/tailwindcss.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/toast.js"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/lib/inter-font.css">
</head>
<body class="gradient-bg min-h-screen">
    <!-- Header -->
    <header class="glass border-b separator">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center gap-8">
            <!-- Left: Logo and title -->
            <div class="flex items-center space-x-3 flex-shrink-0">
                <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h1 class="text-xl font-bold" data-i18n="app_title">Simple-Pic</h1>
            </div>

            <!-- Center: Storage space selector -->
            <div class="flex items-center flex-1 justify-center">
                <!-- Storage space selector for logged-in users -->
                <div id="storageSelector" class="storage-selector-wrapper hidden">
                    <span class="storage-label text-sm text-slate-400" data-i18n="storage">Storage</span>
                    <div class="custom-dropdown">
                        <button id="storageDropdownBtn" class="dropdown-btn">
                            <span id="storageSelectedValue">default</span>
                            <svg class="dropdown-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div id="storageDropdownMenu" class="dropdown-menu hidden">
                            <div id="storageOptions" class="dropdown-options"></div>
                        </div>
                    </div>
                </div>

                <!-- Storage space selector for anonymous users -->
                <div id="anonymousStorageSelector" class="storage-selector-wrapper hidden">
                    <span class="storage-label text-sm text-slate-400" data-i18n="storage">Storage</span>
                    <div class="custom-dropdown">
                        <button id="anonymousDropdownBtn" class="dropdown-btn">
                            <span id="anonymousSelectedValue">default</span>
                            <svg class="dropdown-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div id="anonymousDropdownMenu" class="dropdown-menu hidden">
                            <div id="anonymousOptions" class="dropdown-options"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: User info, admin link, theme/lang toggles -->
            <div class="flex items-center space-x-3 flex-shrink-0">
                <!-- User info -->
                <div id="user-info" class="flex items-center mr-2">
                    <a href="/login.html" class="login-link text-sm" data-i18n="not_logged_in">Not logged in</a>
                </div>

                <button id="admin-link" onclick="window.location.href='/admin/dashboard.html'" class="admin-link admin-btn hidden px-3 py-2 rounded-lg text-sm" data-i18n="admin_panel">
                    管理后台
                </button>

                <!-- Theme and language toggles -->
                <button id="langBtn" class="lang-btn px-3 py-2 rounded-lg text-sm">
                    <span id="langText">中文</span>
                </button>
                <button id="themeBtn" class="theme-btn px-3 py-2 rounded-lg" title="Toggle theme">
                    <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Warning message for anonymous users without storage -->
        <div id="warning-message" class="hidden glass rounded-xl p-4 mb-6 border-l-4 border-yellow-500">
            <div class="flex items-center">
                <svg class="w-5 h-5 text-yellow-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <p class="text-sm text-warning" id="warning-text"></p>
            </div>
        </div>

        <!-- Upload area -->
        <div id="dropZone" class="drop-zone rounded-2xl p-12 text-center cursor-pointer mb-8">
            <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
            <div class="space-y-4">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-blue-500/20">
                    <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                </div>
                <div>
                    <p class="text-xl font-semibold mb-2 text-primary" data-i18n="drop_images_here">Drop images here</p>
                    <p class="text-secondary" data-i18n="or_click_to_select">or click to select • Paste from clipboard (Ctrl+V)</p>
                </div>
            </div>
        </div>

        <!-- Link format selector -->
        <div class="glass rounded-xl p-6 mb-8">
            <h3 class="text-lg font-semibold mb-4 text-primary" data-i18n="link_format">Link Format</h3>
            <div class="flex flex-wrap gap-3">
                <button class="link-format active px-4 py-2 rounded-lg border border-input text-primary text-sm" data-format="markdown" data-i18n="markdown">
                    Markdown
                </button>
                <button class="link-format px-4 py-2 rounded-lg border border-input text-secondary text-sm" data-format="direct" data-i18n="direct_link">
                    Direct Link
                </button>
                <button class="link-format px-4 py-2 rounded-lg border border-input text-secondary text-sm" data-format="html">
                    HTML
                </button>
                <button class="link-format px-4 py-2 rounded-lg border border-input text-secondary text-sm" data-format="bbcode">
                    BBCode
                </button>
            </div>
        </div>

        <!-- Upload history -->
        <div class="glass rounded-xl p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-primary" data-i18n="recent_uploads">Recent Uploads</h3>
                <button id="clear-history" class="text-sm text-muted hover:text-primary transition-colors" data-i18n="clear_history">
                    Clear History
                </button>
            </div>
            <div id="upload-history" class="space-y-3 max-h-96 overflow-y-auto">
                <p class="text-muted text-center py-8" data-i18n="no_uploads_yet">No uploads yet</p>
            </div>
        </div>
    </div>

    <!-- User menu container (outside header for proper z-index) -->
<div id="user-menu-container" class="hidden fixed z-[10000]"></div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 space-y-2 z-[10000]"></div>

    <!-- Change Password Modal -->
    <div id="change-password-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center bg-black/50">
        <div class="modal glass rounded-xl p-6 max-w-md w-full mx-4">
            <h2 class="text-xl font-semibold mb-4 text-primary" data-i18n="change_password">Change Password</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2" data-i18n="current_password">Current Password</label>
                    <input type="password" id="current-password" class="input-field w-full px-4 py-3 rounded-lg" placeholder="">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2" data-i18n="new_password">New Password</label>
                    <input type="password" id="new-password" class="input-field w-full px-4 py-3 rounded-lg" placeholder="">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2" data-i18n="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="input-field w-full px-4 py-3 rounded-lg" placeholder="">
                </div>
            </div>

            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="closeChangePasswordModal()" class="px-4 py-2 rounded-lg btn-secondary text-sm" data-i18n="cancel">Cancel</button>
                <button onclick="submitChangePassword()" class="px-4 py-2 rounded-lg btn-primary text-sm text-white" data-i18n="confirm">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadHistory = document.getElementById('upload-history');
        const linkFormats = document.querySelectorAll('.link-format');
        const storageSelector = document.getElementById('storageSelector');
        const storageDropdownBtn = document.getElementById('storageDropdownBtn');
        const storageDropdownMenu = document.getElementById('storageDropdownMenu');
        const storageOptions = document.getElementById('storageOptions');
        const storageSelectedValue = document.getElementById('storageSelectedValue');
        const anonymousStorageSelector = document.getElementById('anonymousStorageSelector');
        const anonymousDropdownBtn = document.getElementById('anonymousDropdownBtn');
        const anonymousDropdownMenu = document.getElementById('anonymousDropdownMenu');
        const anonymousOptions = document.getElementById('anonymousOptions');
        const anonymousSelectedValue = document.getElementById('anonymousSelectedValue');
        let currentFormat = 'markdown';
        let uploadHistoryData = JSON.parse(localStorage.getItem('uploadHistory') || '[]');
        let currentUser = null;
        let currentStorageSpace = 'default';
        let availableStorageSpaces = [];

        // Theme icons
        const sunIcon = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
        const moonIcon = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            updateThemeIcon();
            updateLangText();
            await checkAuth();
            await checkAnonymousConfig();
            renderUploadHistory();
        });

        // Theme toggle
        document.getElementById('themeBtn').addEventListener('click', () => {
            i18n.toggleTheme();
            updateThemeIcon();
        });

        function updateThemeIcon() {
            const theme = i18n.getTheme();
            document.getElementById('themeIcon').innerHTML = theme === 'light' ? sunIcon : moonIcon;
        }

        // Language toggle
        document.getElementById('langBtn').addEventListener('click', () => {
            i18n.toggleLanguage();
            updateLangText();
        });

        function updateLangText() {
            const lang = i18n.getLanguage();
            document.getElementById('langText').textContent = lang === 'zh' ? '中文' : 'EN';
        }

        // Check authentication
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me');
                const data = await response.json();

                if (data.success) {
                    currentUser = data.user;
                    currentStorageSpace = data.user.currentStorageSpace || 'default';
                    updateUserInfo();
                }
            } catch (error) {
                console.error('Failed to check auth');
            }
        }

        // Get user's available storage spaces
        async function getUserStorageSpaces() {
            try {
                const response = await fetch('/api/auth/me');
                const data = await response.json();
                if (data.success && data.user && data.user.storageSpaces) {
                    return data.user.storageSpaces;
                }
            } catch (error) {
                console.error('Failed to get user storage spaces');
            }
            return [];
        }

        // Check anonymous upload config
        async function checkAnonymousConfig() {
            try {
                const response = await fetch('/api/auth/config');
                const data = await response.json();

                if (data.success && data.availableStorageSpaces) {
                    availableStorageSpaces = data.availableStorageSpaces;

                    // Check URL for storage parameter
                    const urlParams = new URLSearchParams(window.location.search);
                    const storageParam = urlParams.get('storage');

                    if (!currentUser && availableStorageSpaces.length > 0) {
                        // Show storage selector for anonymous users
                        anonymousStorageSelector.classList.remove('hidden');

                        // Populate storage options
                        populateDropdown(anonymousOptions, availableStorageSpaces.map(s => s.name), 'anonymous');

                        // Select the storage from URL or first one
                        if (storageParam) {
                            const exists = availableStorageSpaces.find(s => s.name === storageParam);
                            if (exists) {
                                selectDropdownOption('anonymous', storageParam);
                                currentStorageSpace = storageParam;
                            } else {
                                selectDropdownOption('anonymous', availableStorageSpaces[0].name);
                                currentStorageSpace = availableStorageSpaces[0].name;
                            }
                        } else {
                            selectDropdownOption('anonymous', availableStorageSpaces[0].name);
                            currentStorageSpace = availableStorageSpaces[0].name;
                        }
                    } else if (!currentUser && availableStorageSpaces.length === 0) {
                        // No anonymous upload available - show warning message in center
                        const warningMessage = document.getElementById('warning-message');
                        const warningText = document.getElementById('warning-text');
                        warningText.textContent = i18n.t('no_storage_for_anonymous');
                        warningMessage.classList.remove('hidden');

                        // Hide upload area and other controls
                        dropZone.style.display = 'none';
                        document.querySelector('.glass.rounded-xl.p-6.mb-8')?.classList.add('hidden');
                        document.querySelector('.glass.rounded-xl.p-6:not(.mb-8)')?.classList.add('hidden');
                    }
                }
            } catch (error) {
                console.error('Failed to check anonymous config');
            }
        }

        // Populate dropdown options
        function populateDropdown(container, options, type) {
            container.innerHTML = options.map(opt =>
                `<div class="dropdown-option" data-value="${opt}" data-type="${type}">${opt}</div>`
            ).join('');

            // Add click handlers
            container.querySelectorAll('.dropdown-option').forEach(option => {
                option.addEventListener('click', (e) => {
                    const value = e.target.dataset.value;
                    const type = e.target.dataset.type;
                    selectDropdownOption(type, value);
                });
            });
        }

        // Select dropdown option
        function selectDropdownOption(type, value) {
            if (type === 'storage') {
                storageSelectedValue.textContent = value;
                currentStorageSpace = value;
                storageDropdownMenu.classList.add('hidden');
                // Save preference to server
                fetch('/api/auth/switch-space', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ storageSpace: currentStorageSpace })
                }).catch(err => console.error('Failed to switch storage space:', err));
            } else if (type === 'anonymous') {
                anonymousSelectedValue.textContent = value;
                currentStorageSpace = value;
                anonymousDropdownMenu.classList.add('hidden');
            }
        }

        // Toggle dropdown
        function toggleDropdown(type) {
            const menu = type === 'storage' ? storageDropdownMenu : anonymousDropdownMenu;
            const isHidden = menu.classList.contains('hidden');
            // Close all dropdowns first
            storageDropdownMenu.classList.add('hidden');
            anonymousDropdownMenu.classList.add('hidden');
            // Toggle this one
            if (isHidden) {
                menu.classList.remove('hidden');
            }
        }

        // Dropdown button click handlers
        storageDropdownBtn.addEventListener('click', () => toggleDropdown('storage'));
        anonymousDropdownBtn.addEventListener('click', () => toggleDropdown('anonymous'));

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-dropdown')) {
                storageDropdownMenu.classList.add('hidden');
                anonymousDropdownMenu.classList.add('hidden');
            }
        });

        async function updateUserInfo() {
            const userInfo = document.getElementById('user-info');
            const adminLink = document.getElementById('admin-link');
            const storageSelector = document.getElementById('storageSelector');

            if (currentUser) {
                // Get user's storage spaces
                const userStorageSpaces = await getUserStorageSpaces();
                const userSpaces = userStorageSpaces.length > 0 ? userStorageSpaces : [currentStorageSpace];

                // Show storage selector for logged-in users
                storageSelector.classList.remove('hidden');
                populateDropdown(storageOptions, userSpaces, 'storage');

                // Select current storage space
                if (userSpaces.includes(currentStorageSpace)) {
                    selectDropdownOption('storage', currentStorageSpace);
                } else {
                    selectDropdownOption('storage', userSpaces[0]);
                }

                // Update user info with username and storage in same container
                // Use textContent for username to prevent XSS
                userInfo.innerHTML = `
                    <div class="relative">
                        <button class="flex items-center space-x-1 text-sm font-medium hover:text-accent transition-colors" onclick="toggleUserMenu()">
                            <span class="username-span"></span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                    </div>
                `;
                userInfo.querySelector('.username-span').textContent = currentUser.username;

                if (currentUser.role === 'ADMIN') {
                    adminLink.classList.remove('hidden');
                }
                anonymousStorageSelector.classList.add('hidden');
            }
        }

        // File input change
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = '';
        });

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // Paste from clipboard
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    handleFiles([file]);
                    break;
                }
            }
        });

        // Handle file upload
        async function handleFiles(files) {
            for (let file of files) {
                if (!file.type.startsWith('image/')) {
                    showToast(i18n.t('please_select_images'), 'error');
                    continue;
                }

                await uploadFile(file);
            }
        }

        // Upload file
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            if (currentStorageSpace) {
                formData.append('storageSpace', currentStorageSpace);
            }

            try {
                const response = await fetch('/api/image/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    addToHistory(result, file);
                    const link = getLink(result);
                    await copyToClipboard(link);
                    showToast(i18n.t('image_uploaded'), 'success');
                } else {
                    showToast(result.error || i18n.t('upload_failed'), 'error');
                }
            } catch (error) {
                showToast(i18n.t('upload_failed') + ': ' + error.message, 'error');
            }
        }

        // Get link based on format
        function getLink(result) {
            switch (currentFormat) {
                case 'markdown':
                    return result.markdown;
                case 'direct':
                    return result.directLink;
                case 'html':
                    return result.html;
                case 'bbcode':
                    return result.bbcode;
                default:
                    return result.markdown;
            }
        }

        // Copy to clipboard
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
            } catch (error) {
                console.error('Failed to copy to clipboard:', error);
            }
        }

        // Add to history
        function addToHistory(result, file) {
            const historyItem = {
                url: result.url,
                thumbnailUrl: result.thumbnailUrl,
                path: result.path,
                name: file.name,
                timestamp: Date.now(),
                links: {
                    markdown: result.markdown,
                    direct: result.directLink,
                    html: result.html,
                    bbcode: result.bbcode
                }
            };

            uploadHistoryData.unshift(historyItem);
            if (uploadHistoryData.length > 50) {
                uploadHistoryData.pop();
            }
            localStorage.setItem('uploadHistory', JSON.stringify(uploadHistoryData));
            renderUploadHistory();
        }

        // Render upload history
        function renderUploadHistory() {
            if (uploadHistoryData.length === 0) {
                uploadHistory.innerHTML = `<p class="text-slate-500 text-center py-8" data-i18n="no_uploads_yet">${i18n.t('no_uploads_yet')}</p>`;
                return;
            }

            uploadHistory.innerHTML = uploadHistoryData.map(item => {
                // Escape HTML special characters in item.name to prevent XSS
                const escapeHtml = (str) => {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                };
                const escapedName = escapeHtml(item.name);
                const escapedLink = escapeHtml(item.links[currentFormat]);

                return `
                <div class="history-item flex items-center space-x-4 p-3 rounded-lg transition-colors">
                    <img src="${item.thumbnailUrl}" alt="${escapedName}" class="w-12 h-12 rounded-lg preview-image object-cover">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate">${escapedName}</p>
                        <p class="text-xs text-slate-400 truncate">${escapedLink}</p>
                    </div>
                    <button onclick="copyLink('${item.links[currentFormat].replace(/'/g, "\\'")}')" class="p-2 rounded-lg hover:bg-slate-700 transition-colors" title="Copy link">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                    </button>
                </div>
            `;
            }).join('');
        }

        // Copy link from history
        window.copyLink = async function(link) {
            await copyToClipboard(link);
            showToast(i18n.t('link_copied'), 'success');
        };

        // Clear history
        document.getElementById('clear-history').addEventListener('click', () => {
            uploadHistoryData = [];
            localStorage.removeItem('uploadHistory');
            renderUploadHistory();
            showToast(i18n.t('history_cleared'), 'success');
        });

        // Link format selection
        linkFormats.forEach(btn => {
            btn.addEventListener('click', () => {
                linkFormats.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFormat = btn.dataset.format;
                renderUploadHistory();
            });
        });

        // Logout function
        window.logout = async function() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/login.html';
            } catch (error) {
                console.error('Logout failed:', error);
            }
        };

        // Toggle user menu
        window.toggleUserMenu = function() {
            const userInfo = document.getElementById('user-info');
            const menuContainer = document.getElementById('user-menu-container');

            if (menuContainer.classList.contains('hidden')) {
                // Show menu
                menuContainer.innerHTML = `
                    <div class="glass rounded-lg shadow-lg w-48 py-2">
                        <button class="w-full text-left px-4 py-2 text-sm hover:bg-slate-700/50 text-primary flex items-center space-x-2" onclick="showChangePasswordModal()">
                            <svg class="w-4 h-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                            </svg>
                            <span data-i18n="change_password">Change Password</span>
                        </button>
                        <button class="w-full text-left px-4 py-2 text-sm hover:bg-slate-700/50 text-primary flex items-center space-x-2" onclick="logout()">
                            <svg class="w-4 h-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                            <span data-i18n="logout">Logout</span>
                        </button>
                    </div>
                `;

                // Position menu
                const rect = userInfo.getBoundingClientRect();
                menuContainer.style.top = (rect.bottom + 5) + 'px';
                menuContainer.style.right = (window.innerWidth - rect.right) + 'px';

                menuContainer.classList.remove('hidden');
                i18n.applyLanguage();
            } else {
                menuContainer.classList.add('hidden');
                menuContainer.innerHTML = '';
            }
        };

        // Close user menu when clicking outside
        document.addEventListener('click', (e) => {
            const userInfo = document.getElementById('user-info');
            const menuContainer = document.getElementById('user-menu-container');
            if (userInfo && !userInfo.contains(e.target) && !menuContainer.contains(e.target)) {
                menuContainer.classList.add('hidden');
                menuContainer.innerHTML = '';
            }
        });

        // Show change password modal
        window.showChangePasswordModal = function() {
            document.getElementById('change-password-modal').classList.remove('hidden');
            document.getElementById('user-menu-container').classList.add('hidden');
            document.getElementById('user-menu-container').innerHTML = '';
            // Clear form fields
            document.getElementById('current-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        };

        // Close change password modal
        window.closeChangePasswordModal = function() {
            document.getElementById('change-password-modal').classList.add('hidden');
        };

        // Submit change password
        window.submitChangePassword = async function() {
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Validation
            if (!currentPassword || !newPassword || !confirmPassword) {
                showToast(i18n.t('please_fill_all_fields'), 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast(i18n.t('passwords_not_match'), 'error');
                return;
            }

            if (newPassword.length < 6) {
                showToast(i18n.t('password_too_short'), 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        currentPassword: currentPassword,
                        newPassword: newPassword
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showToast(i18n.t('password_changed'), 'success');
                    closeChangePasswordModal();
                } else {
                    const errorMsg = result.error || i18n.t('password_change_failed');
                    showToast(errorMsg, 'error');
                }
            } catch (error) {
                showToast(i18n.t('password_change_failed') + ': ' + error.message, 'error');
            }
        };

        // Toast notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast px-4 py-3 rounded-lg text-white ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
